---
apiVersion: v1
kind: Pod
metadata:
  name: nvadd
spec:
  restartPolicy: OnFailure
  containers:
    - name: nvadd
      image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0-ubi8
      resources:
        limits:
          nvidia.com/gpu: 1

      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
