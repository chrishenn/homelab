# Custom TLS configuration for enhanced security
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: modern-tls
  namespace: default
spec:
  # Minimum TLS version (TLS 1.2 or 1.3 recommended)
  minVersion: VersionTLS12
  # Maximum TLS version
  maxVersion: VersionTLS13
  # Cipher suites for TLS 1.2 (TLS 1.3 has fixed ciphers)
  cipherSuites:
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
  # Curve preferences for ECDHE
  curvePreferences:
    - CurveP521
    - CurveP384
  # Enable strict SNI checking
  sniStrict: true

---
# Strict TLS option for highly sensitive endpoints
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: strict-tls
  namespace: default
spec:
  # Only allow TLS 1.3
  minVersion: VersionTLS13
  # Require client certificates (mutual TLS)
  clientAuth:
    # Secret containing CA certificate for client verification
    secretNames:
      - client-ca-cert
    # Require valid client certificate
    clientAuthType: RequireAndVerifyClientCert

---
# in an IngressRoute, reference the tlsoptions resource by name:
#  tls:
#    certResolver: letsencrypt
#    options:
#      name: modern-tls
# or
#      name: strict-tls
#      namespace: default
