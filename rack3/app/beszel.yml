---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beszel-agent-rack3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beszel-agent
  template:
    metadata:
      labels:
        app: beszel-agent
    spec:
      runtimeClassName: nvidia
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [rack3]
      containers:
        - env:
            - name: LISTEN
              value: '45876'
            - name: HUB_URL
              value: https://beszel.chenn.dev
            - name: KEY
              valueFrom:
                secretKeyRef:
                  name: dev-secrets
                  key: BESZEL_KEY
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: dev-secrets
                  key: BESZEL_TOKEN
          image: henrygd/beszel-agent-nvidia:latest
          imagePullPolicy: Always
          name: beszel-agent
          ports:
            - containerPort: 45876
              hostPort: 45876
      restartPolicy: Always
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists

