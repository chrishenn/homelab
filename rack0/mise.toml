[tools]
just = "latest"
bun = "latest"
node = "latest"
pnpm = "latest"
fnox = "latest"

[env]
OP_RUN_NO_MASKING = true
COMPOSE_BAKE = true
SYNC_MODE = "cron"

TZ = "America/Chicago"
PUID = 1000
PGID = 1000

# compose host
DOCKER_HOST = "tcp://192.168.1.70:2375"

# paths to homelab repo on host
HOME_HOST = "/home/chris"
REPO_HOST = "/home/chris/Projects/homelab"

# paths to data
DATA = "/mnt/k/docker"

# IPs
SVC_IP = "192.168.1.70"
