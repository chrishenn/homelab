# sudo chown -R 1001:1001 $DATA/listenarr/config
---
services:
  listenarr:
    profiles: [listenarr]
    image: ghcr.io/listenarrs/listenarr:canary
    container_name: listenarr
    restart: unless-stopped
    environment:
      LISTENARR_PUBLIC_URL: https://listenarr.chenn.dev
      LISTENARR_LOG_LEVEL: Information
    volumes:
      - $DATA/listenarr/config:/app/config
      - $DATA/listenarr/downloads:/downloads
      - $MEDIA/Books:/books
    networks: [newt, traefik]
    labels:
      homepage.group: Books
      homepage.name: Listenarr
      homepage.icon: https://github.com/Listenarrs/Listenarr/blob/canary/fe/public/icon.png?raw=true
      homepage.href: https://listenarr.chenn.dev
      homepage.description: Audiobook Server

      traefik.enable: true
      traefik.http.routers.listenarr.rule: Host(`listenarr.henn.dev`)
      traefik.http.routers.listenarr.entrypoints: websecure
      traefik.http.routers.listenarr.middlewares: hdrs@file
      traefik.http.routers.listenarr.tls.certresolver: cf
      traefik.http.services.listenarr.loadbalancer.server.port: 4545

      pangolin.public-resources.listenarr.name: listenarr
      pangolin.public-resources.listenarr.full-domain: listenarr.chenn.dev
      pangolin.public-resources.listenarr.mode: http
      pangolin.public-resources.listenarr.targets[0].method: http
      pangolin.public-resources.listenarr.targets[0].port: 4545
      pangolin.public-resources.listenarr.policy: member
