services:
  opencloud:
    profiles: [opencloud]
    image: opencloudeu/opencloud-rolling:latest
    container_name: opencloud
    restart: unless-stopped
    entrypoint:
      - /bin/sh
    command: ["-c", "opencloud init || true; opencloud server"]
    environment:
      <<: *oc_env
    volumes:
      - ./opencloud/csp.yaml:/etc/csp.yaml
      - $DATA/opencloud/config:/etc/opencloud
      - $DATA/opencloud/data:/var/lib/opencloud
      - $DATA/opencloud/app:/var/lib/opencloud/web/assets/apps
    networks: [traefik]
    labels:
      traefik.enable: true
      traefik.http.routers.collabora.rule: Host(`oc.henn.dev`)
      traefik.http.routers.collabora.entrypoints: websecure
      traefik.http.routers.collabora.middlewares: hdrs@file
      traefik.http.routers.collabora.tls.certresolver: cf
      traefik.http.services.collabora.loadbalancer.server.port: 9200

