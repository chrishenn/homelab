  PROXY_ENABLE_BASIC_AUTH: false
  PROXY_TLS: false
  PROXY_CSP_CONFIG_FILE_LOCATION: /etc/csp.yaml

  IDM_CREATE_DEMO_USERS: false
  IDM_ADMIN_PASSWORD: ${PASS}

#  NOTIFICATIONS_SMTP_HOST: ${SMTP_HOST}
