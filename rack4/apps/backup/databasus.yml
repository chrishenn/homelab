---
services:
  databasus:
    profiles: [databasus]
    image: databasus/databasus:latest
    container_name: databasus
    restart: unless-stopped
    volumes:
      - $DATA/databasus/data:/databasus-data
    networks: [newt]
    labels:
      homepage.group: Development Tools
      homepage.name: Databasus
      homepage.icon: databasus.png
      homepage.href: https://databasus.chenn.dev
      homepage.description: Database Backup GUI

      pangolin.public-resources.databasus.name: databasus
      pangolin.public-resources.databasus.full-domain: databasus.chenn.dev
      pangolin.public-resources.databasus.mode: http
      pangolin.public-resources.databasus.targets[0].method: http
      pangolin.public-resources.databasus.targets[0].port: 4005
      pangolin.public-resources.databasus.policy: chris
