---
services:
  lidarr:
    profiles: [arr]
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      LIDARR__AUTH__METHOD: External
    volumes:
      - $DATA/lidarr:/config
      - $DATA/sab/downloads:/sab/downloads
      - $DATA/qbit/downloads:/qbit/downloads
      - $MEDIA:/media_library
    networks: [arr, newt]
    labels:
      homepage.group: Arr
      homepage.name: Lidarr
      homepage.icon: lidarr.png
      homepage.href: https://lidarr.chenn.dev
      homepage.description: Music Manager

      pangolin.public-resources.lidarr.name: lidarr
      pangolin.public-resources.lidarr.full-domain: lidarr.chenn.dev
      pangolin.public-resources.lidarr.protocol: http
      pangolin.public-resources.lidarr.ssl: true
      pangolin.public-resources.lidarr.targets[0].method: http
      pangolin.public-resources.lidarr.targets[0].port: 8686
      pangolin.public-resources.lidarr.auth.sso-enabled: true
      pangolin.public-resources.lidarr.auth.sso-roles[0]: Member
      pangolin.public-resources.lidarr.auth.basic-auth.user: ${ARR_PANGOLIN_AUTH_USER}
      pangolin.public-resources.lidarr.auth.basic-auth.password: ${ARR_PANGOLIN_AUTH_PASS}
      pangolin.public-resources.lidarr.rules[0].action: pass
      pangolin.public-resources.lidarr.rules[0].match: country
      pangolin.public-resources.lidarr.rules[0].value: US
      pangolin.public-resources.lidarr.rules[1].action: deny
      pangolin.public-resources.lidarr.rules[1].match: country
      pangolin.public-resources.lidarr.rules[1].value: ALL
