x-sure_env: &sure_env
  APP_DOMAIN: sure.chenn.dev
  SECRET_KEY_BASE: ${SURE_SECRET}
  SELF_HOSTED: 'true'
  RAILS_FORCE_SSL: 'false'
  RAILS_ASSUME_SSL: 'true'
  ONBOARDING_STATE: closed
  OPENAI_ACCESS_TOKEN:
  EXCHANGE_RATE_PROVIDER: yahoo_finance
  SECURITIES_PROVIDER: yahoo_finance
  DISABLE_SSL: false
  PRODUCT_NAME: Sure Chicken
  BRAND_NAME: Chicken Accounting, Inc

  DB_HOST: sure_db
  DB_PORT: 5432
  POSTGRES_USER: sure
  POSTGRES_PASSWORD: sure
  POSTGRES_DB: sure
  REDIS_URL: redis://sure_redis:6379/1

  SMTP_ADDRESS: ${SMTP_HOST}
  SMTP_PORT: 465
  SMTP_USERNAME: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_TOKEN}
  SMTP_TLS_ENABLED: true
  SMTP_TLS_SKIP_VERIFY: false
  EMAIL_SENDER: ${SMTP_USER}

  AUTH_LOCAL_LOGIN_ENABLED: false
  AUTH_LOCAL_ADMIN_OVERRIDE_ENABLED: true
  ALLOWED_OIDC_DOMAINS: chenn.dev
  OIDC_ISSUER: $OIDC
  OIDC_REDIRECT_URI: https://sure.chenn.dev/auth/openid_connect/callback
  OIDC_CLIENT_ID: ${SURE_OIDC_CLIENT}
  OIDC_CLIENT_SECRET: ${SURE_OIDC_SECRET}
  OIDC_BUTTON_LABEL: Pocket ID
  OIDC_BUTTON_ICON: key

services:
  sure:
    profiles: [sure]
    image: ghcr.io/we-promise/sure:stable
    container_name: sure
    restart: unless-stopped
    volumes:
      - $DATA/sure/data:/rails/storage
    environment:
      <<: *sure_env
    depends_on:
      sure_db:
        condition: service_healthy
      sure_redis:
        condition: service_healthy
    networks: [sure, newt]
    labels:
      homepage.group: Tools
      homepage.name: Sure
      homepage.icon: sure.png
      homepage.href: https://sure.chenn.dev
      homepage.description: Finance Tracking

      pangolin.public-resources.sure.name: sure
      pangolin.public-resources.sure.full-domain: sure.chenn.dev
      pangolin.public-resources.sure.protocol: http
      pangolin.public-resources.sure.ssl: true
      pangolin.public-resources.sure.targets[0].method: http
      pangolin.public-resources.sure.targets[0].port: 3000
      pangolin.public-resources.sure.auth.sso-enabled: true
      pangolin.public-resources.sure.auth.sso-roles[0]: Member
      pangolin.public-resources.sure.rules[0].action: pass
      pangolin.public-resources.sure.rules[0].match: country
      pangolin.public-resources.sure.rules[0].value: US
      pangolin.public-resources.sure.rules[1].action: deny
      pangolin.public-resources.sure.rules[1].match: country
      pangolin.public-resources.sure.rules[1].value: ALL

  sure_worker:
    profiles: [sure]
    image: ghcr.io/we-promise/sure:stable
    container_name: sure_worker
    restart: unless-stopped
    command: bundle exec sidekiq
    environment:
      <<: *sure_env
    volumes:
      - $DATA/sure/data:/rails/storage
    depends_on:
      sure_db:
        condition: service_healthy
      sure_redis:
        condition: service_healthy
    networks: [sure]

  sure_db:
    profiles: [sure]
    image: postgres:18-alpine
    container_name: sure_db
    restart: unless-stopped
    environment:
      <<: *sure_env
    volumes:
      - $DATA/sure/db:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [sure]

  sure_redis:
    profiles: [sure]
    image: redis:latest
    container_name: sure_redis
    restart: unless-stopped
    volumes:
      - $DATA/sure/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [sure]

networks:
  sure:
