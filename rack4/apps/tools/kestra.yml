# to use curl to launch an execution
# curl -u <email> -X post ...
# curl will prompt for password

# SSO is enterprise-only
# bit heavy at idle
---
services:
  kestra:
    profiles: [kestra]
    image: kestra/kestra:latest
    container_name: kestra
    restart: unless-stopped
    user: root
    command: server standalone
    environment:
      EMAIL: ${EMAIL}
      PASS: ${PASS}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_db:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basicAuth:
              username: ${EMAIL}
              password: ${PASS}
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - $DATA/kestra/kestra:/app/storage
      - $DATA/kestra/tmp/:/tmp/kestra-wd
    networks: [kestra, newt, traefik]
    labels:
      homepage.group: General Tools
      homepage.name: Kestra
      homepage.icon: kestra.png
      homepage.href: https://kestra.chenn.dev
      homepage.description: Workflow Automation

      traefik.enable: true
      traefik.http.routers.kestra.rule: Host(`kestra.henn.dev`)
      traefik.http.routers.kestra.entrypoints: websecure
      traefik.http.routers.kestra.tls.certresolver: cf
      traefik.http.services.kestra.loadbalancer.server.port: 8080

      pangolin.public-resources.kestra.name: kestra
      pangolin.public-resources.kestra.full-domain: kestra.chenn.dev
      pangolin.public-resources.kestra.mode: http
      pangolin.public-resources.kestra.targets[0].method: http
      pangolin.public-resources.kestra.targets[0].port: 8080
      pangolin.public-resources.kestra.policy: member

  kestra_db:
    profiles: [kestra]
    image: postgres:18-alpine
    container_name: kestra_db
    restart: unless-stopped
    volumes:
      - $DATA/kestra/kestra_db:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    healthcheck:
      test: pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
    networks: [kestra]

networks:
  kestra:
