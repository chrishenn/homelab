  # https://mail.chenn.dev/webmail/admin
  bulwark:
    profiles: [bulwark]
    build:
      context: https://github.com/bulwarkmail/webmail.git
      args:
        NEXT_PUBLIC_BASE_PATH: /webmail
    image: ${REGISTRY}/bulwarkmail/webmail:latest
    container_name: bulwark
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_LOCALE_PREFIX: always
      JMAP_SERVER_URL: https://mail.chenn.dev
      APP_NAME: Chicken Mail
      ADMIN_PASSWORD: ${BULWARK_PASS}
      SESSION_SECRET: ${BULWARK_SESSION}
      SETTINGS_SYNC_ENABLED: true
      BULWARK_TELEMETRY: off
    volumes:
      - $DATA/bulwark/admin:/app/data/admin
      - $DATA/bulwark/state:/app/data/admin-state
    depends_on:
      bulwark_perm:
        condition: service_completed_successfully
    networks: [newt]
    labels:
      pangolin.public-resources.mail.targets[1].method: http
      pangolin.public-resources.mail.targets[1].path: /webmail
      pangolin.public-resources.mail.targets[1].path-match: prefix
      pangolin.public-resources.mail.targets[1].port: 3000

  bulwark_perm:
    profiles: [bulwark]
    image: alpine
    container_name: bulwark_perm
    restart: no
    user: root
    volumes:
      - $DATA/bulwark:/data
    command: /bin/sh -c 'mkdir -p /data/admin /data/state && chown -R 1001:1001 /data'

  test:
    profiles: [test]
    image: alpine
    container_name: test
    restart: no
    networks: [newt]
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk update && apk add bind-tools
        eval /bin/sh

networks:
  stalwart:
