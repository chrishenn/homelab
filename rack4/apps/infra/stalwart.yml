---
services:
  stalwart:
    profiles: [stalwart]
    image: stalwartlabs/stalwart:latest
    container_name: stalwart
    restart: unless-stopped
    environment:
      STALWART_PUBLIC_URL: https://mail.chenn.dev
      CLOUDFLARE_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      POSTGRES_PASSWORD: stalwart

    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/stalwart/data:/etc/stalwart
      - $DATA/stalwart/var:/var/lib/stalwart
      - $DATA/stalwart/certs:/data/certs:ro
    depends_on:
      stalwart_certs:
        condition: service_completed_successfully
    networks:
      stalwart:
      newt:
        ipv4_address: 192.168.200.2
    labels:
      pangolin.public-resources.mail.name: mail
      pangolin.public-resources.mail.full-domain: mail.chenn.dev
      pangolin.public-resources.mail.mode: http
      pangolin.public-resources.mail.ssl: true
      pangolin.public-resources.mail.targets[0].method: http
      pangolin.public-resources.mail.targets[0].port: 8080

      pangolin.public-resources.mail_1.name: mail_1
      pangolin.public-resources.mail_1.full-domain: autodiscover.chenn.dev
      pangolin.public-resources.mail_1.mode: http
      pangolin.public-resources.mail_1.ssl: true
      pangolin.public-resources.mail_1.targets[0].method: http
      pangolin.public-resources.mail_1.targets[0].port: 8080

      pangolin.public-resources.mail_2.name: mail_2
      pangolin.public-resources.mail_2.full-domain: autoconfig.chenn.dev
      pangolin.public-resources.mail_2.mode: http
      pangolin.public-resources.mail_2.ssl: true
      pangolin.public-resources.mail_2.targets[0].method: http
      pangolin.public-resources.mail_2.targets[0].port: 8080

      pangolin.public-resources.mail_3.name: mail_3
      pangolin.public-resources.mail_3.full-domain: mta-sts.chenn.dev
      pangolin.public-resources.mail_3.mode: http
      pangolin.public-resources.mail_3.ssl: true
      pangolin.public-resources.mail_3.targets[0].method: http
      pangolin.public-resources.mail_3.targets[0].port: 8080

      pangolin.public-resources.smtp.name: smtp
      pangolin.public-resources.smtp.mode: tcp
      pangolin.public-resources.smtp.proxy-port: 25
      pangolin.public-resources.smtp.targets[0].port: 25
      pangolin.public-resources.smtp.proxy-protocol: true
      pangolin.public-resources.smtp.proxy-protocol-version: 2

      pangolin.public-resources.smtps.name: smtps
      pangolin.public-resources.smtps.mode: tcp
      pangolin.public-resources.smtps.proxy-port: 465
      pangolin.public-resources.smtps.targets[0].port: 465
      pangolin.public-resources.smtps.proxy-protocol: true
      pangolin.public-resources.smtps.proxy-protocol-version: 2

      pangolin.public-resources.imaps.name: imaps
      pangolin.public-resources.imaps.mode: tcp
      pangolin.public-resources.imaps.proxy-port: 993
      pangolin.public-resources.imaps.targets[0].port: 993
      pangolin.public-resources.imaps.proxy-protocol: true
      pangolin.public-resources.imaps.proxy-protocol-version: 2

  stalwart_certs:
    profiles: [stalwart]
    image: docker:dind
    container_name: stalwart_certs
    restart: no
    privileged: true
    user: root
    environment:
      DOCKER_HOST: ssh://chris@${VPS0_IP}:2200
    volumes:
      - $DATA/stalwart:/data
      - $HOME/.ssh:/ssh
    command:
      - /bin/sh
      - -c
      - |
        set -x
        mkdir -p /root/.ssh
        cp -r /ssh/id_ed* /root/.ssh/
        chown -R root:root /root/.ssh

        tee /root/.ssh/config <<- 'END'
        Host *
          StrictHostKeyChecking no
        END

        rm -rf /data/certs
        docker cp traefik_cert:/output /data/certs

        mkdir -p /data/data /data/var
        chown -R 2000:2000 /data
        echo "copied certs; exiting: $?"
        exit $?

