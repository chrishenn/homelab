  #        echo "Copied certs. Exited with: $$?"
  #        exit 0

  stalwart_meili:
    profiles: [stalwart]
    image: getmeili/meilisearch:latest
    container_name: stalwart_meili
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${STALWART_MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: true
    volumes:
      - $DATA/stalwart/meili:/meili_data
    networks: [stalwart, traefik]
    labels:
      traefik.enable: true
      traefik.http.routers.stalwart_search.rule: Host(`search.stalwart.henn.dev`)
      traefik.http.routers.stalwart_search.entrypoints: websecure
      traefik.http.routers.stalwart_search.middlewares: hdrs@file
      traefik.http.routers.stalwart_search.tls.certresolver: cf
      traefik.http.services.stalwart_search.loadbalancer.server.port: 7700

  # todo: verify that these are working
  stalwart_db:
    profiles: [stalwart]
    image: postgres:18-alpine
    container_name: stalwart_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stalwart
      POSTGRES_PASSWORD: stalwart
      POSTGRES_DB: stalwart
    volumes:
      - $DATA/stalwart/db:/var/lib/postgresql
    networks: [stalwart]

  stalwart_redis:
    profiles: [stalwart]
    image: valkey/valkey:alpine
    container_name: stalwart_redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks: [stalwart]

  stalwart_s3:
    profiles: [stalwart]
    image: dxflrs/garage:v2.3.0
    container_name: stalwart_s3
    restart: unless-stopped
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: stalwart
      GARAGE_DEFAULT_SECRET_KEY: ${STALWART_S3_SECRET}
      GARAGE_DEFAULT_BUCKET: stalwart
    configs:
      - source: stalwart_s3
        target: /etc/garage.toml
    volumes:
      - $DATA/stalwart/s3/data:/var/lib/garage/data
      - $DATA/stalwart/s3/meta:/var/lib/garage/meta
    command: /garage server --single-node --default-bucket
    networks: [stalwart]

  bulwark:
    profiles: [bulwark]
    build:
      context: https://github.com/bulwarkmail/webmail.git
      args:
        NEXT_PUBLIC_BASE_PATH: /webmail
    image: ${REGISTRY}/bulwarkmail/webmail:latest
    container_name: bulwark
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_LOCALE_PREFIX: always
      JMAP_SERVER_URL: https://mail.chenn.dev
      APP_NAME: Chicken Mail
      ADMIN_PASSWORD: ${BULWARK_PASS}
      SESSION_SECRET: ${BULWARK_SESSION}
      SETTINGS_SYNC_ENABLED: true
      BULWARK_TELEMETRY: off
    volumes:
      - $DATA/bulwark/admin:/app/data/admin
      - $DATA/bulwark/state:/app/data/admin-state
    depends_on:
      bulwark_perm:
        condition: service_completed_successfully
    networks: [newt]
    labels:
      pangolin.public-resources.mail.targets[1].method: http
      pangolin.public-resources.mail.targets[1].path: /webmail
      pangolin.public-resources.mail.targets[1].path-match: prefix
      pangolin.public-resources.mail.targets[1].port: 3000

  bulwark_perm:
    profiles: [bulwark]
    image: alpine
    container_name: bulwark_perm
    restart: no
    user: root
    volumes:
      - $DATA/bulwark:/data
    command: /bin/sh -c 'mkdir -p /data/admin /data/state && chown -R 1001:1001 /data'
