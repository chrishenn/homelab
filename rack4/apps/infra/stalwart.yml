---
configs:
  wg_conf:
    content: |
      [Interface]
      Address = 10.64.133.56/24
      ListenPort = 51821
      PrivateKey = ${STALWART_WG_CLIENT_PRIVATE}
      PostUp = /etc/postup.sh %i
      PostDown = /etc/postdown.sh %i

      [Peer]
      PublicKey = ${STALWART_WG_SERVER_PUBLIC}
      Endpoint = ${VPS0_IP}:51821
      AllowedIPs = 0.0.0.0/0
      PersistentKeepalive = 25
  wg_postup:
    content: |
      set -x
      DROUTE=$$(ip route | grep default | awk '{print $$3}')
      HOMENET=${HOME_SUBNET}
      HOMENET2=${TRAEFIK_SUBNET}
      HOMENET3=${NEWT_SUBNET}
      ip route add $$HOMENET via $$DROUTE
      ip route add $$HOMENET2 via $$DROUTE
      ip route add $$HOMENET3 via $$DROUTE
      iptables -I OUTPUT -d $$HOMENET -j ACCEPT
      iptables -I OUTPUT -d $$HOMENET2 -j ACCEPT
      iptables -I OUTPUT -d $$HOMENET3 -j ACCEPT
      iptables -A OUTPUT ! -o $$1 -m mark ! --mark $$(wg show $$1 fwmark) -m addrtype ! --dst-type LOCAL -j REJECT
      iptables -t nat -A POSTROUTING -o $$1 -j MASQUERADE
  wg_postdown:
    content: |
      HOMENET=${HOME_SUBNET}
      HOMENET2=${TRAEFIK_SUBNET}
      HOMENET3=${NEWT_SUBNET}
      ip route delete $$HOMENET
      ip route delete $$HOMENET2
      ip route delete $$HOMENET3
      iptables -D OUTPUT ! -o $$1 -m mark ! --mark $$(wg show $$1 fwmark) -m addrtype ! --dst-type LOCAL -j REJECT
      iptables -D OUTPUT -d $$HOMENET -j ACCEPT
      iptables -D OUTPUT -d $$HOMENET2 -j ACCEPT
      iptables -D OUTPUT -d $$HOMENET3 -j ACCEPT
      iptables -t nat -D POSTROUTING -o $$1 -j MASQUERADE
  stalwart_s3:
    content: |
      metadata_dir = "/var/lib/garage/meta"
      data_dir = "/var/lib/garage/data"
      db_engine = "sqlite"
      replication_factor = 1

      rpc_bind_addr = "[::]:3901"
      rpc_public_addr = "127.0.0.1:3901"
      rpc_secret = "${STALWART_S3_RPC}"

      [s3_api]
      s3_region = "stalwart_s3"
      api_bind_addr = "[::]:3900"
      root_domain = ".s3.garage.localhost"

networks:
  stalwart:
    ipam:
      config:
        # this subnet is excluded from WG tunneling by stalwart_wg config: wg_postup
        - subnet: 192.168.101.0/24
          gateway: 192.168.101.1

services:
  stalwart_wg:
    profiles: [stalwart]
    image: linuxserver/wireguard:latest
    container_name: stalwart_wg
    restart: unless-stopped
    cap_add: [NET_ADMIN, SYS_MODULE]
    configs:
      - source: wg_conf
        target: /config/wg_confs/wg0.conf
      - source: wg_postup
        target: /etc/postup.sh
        mode: 0755
      - source: wg_postdown
        target: /etc/postdown.sh
        mode: 0755
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    networks: [stalwart, traefik, newt]
    labels:
      traefik.enable: true
      traefik.http.routers.mail.rule: Host(`mail.henn.dev`)
      traefik.http.routers.mail.entrypoints: websecure
      traefik.http.routers.mail.middlewares: hdrs@file
      traefik.http.routers.mail.tls.certresolver: cf
      traefik.http.services.mail.loadbalancer.server.port: 8080

      pangolin.public-resources.mail.name: mail
      pangolin.public-resources.mail.full-domain: mail.chenn.dev
      pangolin.public-resources.mail.mode: http
      pangolin.public-resources.mail.targets[0].method: http
      pangolin.public-resources.mail.targets[0].path: /
      pangolin.public-resources.mail.targets[0].path-match: prefix
      pangolin.public-resources.mail.targets[0].port: 8080

      pangolin.public-resources.mail_1.name: mail_1
      pangolin.public-resources.mail_1.full-domain: autodiscover.chenn.dev
      pangolin.public-resources.mail_1.mode: http
      pangolin.public-resources.mail_1.targets[0].method: http
      pangolin.public-resources.mail_1.targets[0].port: 8080

      pangolin.public-resources.mail_2.name: mail_2
      pangolin.public-resources.mail_2.full-domain: autoconfig.chenn.dev
      pangolin.public-resources.mail_2.mode: http
      pangolin.public-resources.mail_2.targets[0].method: http
      pangolin.public-resources.mail_2.targets[0].port: 8080

      pangolin.public-resources.mail_3.name: mail_3
      pangolin.public-resources.mail_3.full-domain: mta-sts.chenn.dev
      pangolin.public-resources.mail_3.mode: http
      pangolin.public-resources.mail_3.targets[0].method: http
      pangolin.public-resources.mail_3.targets[0].port: 8080

  stalwart:
    profiles: [stalwart]
    image: stalwartlabs/stalwart:latest
    container_name: stalwart
    restart: unless-stopped
    environment:
      STALWART_PUBLIC_URL: https://mail.chenn.dev
      CLOUDFLARE_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      POSTGRES_PASSWORD: stalwart
      S3_SECRET_KEY: ${STALWART_S3_SECRET}
      MEILI_MASTER_KEY: ${STALWART_MEILI_MASTER_KEY}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/stalwart/data:/etc/stalwart
      - $DATA/stalwart/var:/var/lib/stalwart
      - $DATA/stalwart/certs:/data/certs:ro
    depends_on:
      stalwart_perm:
        condition: service_completed_successfully
    #      stalwart_certs:
    #        condition: service_completed_successfully
    network_mode: service:stalwart_wg

  stalwart_perm:
    profiles: [stalwart]
    image: alpine
    container_name: stalwart_perm
    restart: no
    user: root
    volumes:
      - $DATA/stalwart:/data
    command:
      - /bin/sh
      - -c
      - |
        set -x
        mkdir -p /data/data /data/var
        chown -R 2000:2000 /data/data /data/var
        mkdir -p /data/search
        chown -R 1000:1000 /data/search
        echo "set perms: $?"

