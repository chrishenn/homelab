# todo: https://bulwarkmail.org/docs/getting-started/introduction
# todo: needs its own vps and traefik instance

# admin/creds in docker logs
# https://mail.henn.dev/admin
# sudo chown -R 2000:2000 $DATA/stalwart

# will automatically connect to cloudflare to add {dkim, dmarc, etc} dns records ... amazing!
# note: can't use vps0, as pangolin binds to port 80/443, and you only get one public ip on the vps
---
services:
  stalwart:
    profiles: [stalwart]
    image: stalwartlabs/stalwart:latest
    container_name: stalwart
    restart: unless-stopped
    environment:
      STALWART_PUBLIC_URL: https://mail.henn.dev
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/traefik_certs:/data/certs:ro

      - $DATA/stalwart/data:/etc/stalwart
      - $DATA/stalwart/var:/var/lib/stalwart
    networks:
      traefik:
        ipv4_address: 192.168.100.5
    labels:
      traefik.enable: true
      traefik.http.routers.mailserver.rule: Host(`mail.henn.dev`) || Host(`autodiscover.henn.dev`) || Host(`autoconfig.henn.dev`) || Host(`mta-sts.henn.dev`)
      traefik.http.routers.mailserver.entrypoints: websecure
      traefik.http.routers.mailserver.service: mailserver
      traefik.http.services.mailserver.loadbalancer.server.port: 8080

      traefik.tcp.routers.smtp.rule: HostSNI(`*`)
      traefik.tcp.routers.smtp.entrypoints: smtp
      traefik.tcp.routers.smtp.service: smtp
      traefik.tcp.services.smtp.loadbalancer.server.port: 25
      traefik.tcp.services.smtp.loadbalancer.proxyProtocol.version: 2

      traefik.tcp.routers.jmap.rule: HostSNI(`*`)
      traefik.tcp.routers.jmap.tls.passthrough: true
      traefik.tcp.routers.jmap.entrypoints: websecure
      traefik.tcp.routers.jmap.service: jmap
      traefik.tcp.services.jmap.loadbalancer.server.port: 443
      traefik.tcp.services.jmap.loadbalancer.proxyProtocol.version: 2

      traefik.tcp.routers.smtps.rule: HostSNI(`*`)
      traefik.tcp.routers.smtps.tls.passthrough: true
      traefik.tcp.routers.smtps.entrypoints: smtps
      traefik.tcp.routers.smtps.service: smtps
      traefik.tcp.services.smtps.loadbalancer.server.port: 465
      traefik.tcp.services.smtps.loadbalancer.proxyProtocol.version: 2

      traefik.tcp.routers.imaps.rule: HostSNI(`*`)
      traefik.tcp.routers.imaps.tls.passthrough: true
      traefik.tcp.routers.imaps.entrypoints: imaps
      traefik.tcp.routers.imaps.service: imaps
      traefik.tcp.services.imaps.loadbalancer.server.port: 993
      traefik.tcp.services.imaps.loadbalancer.proxyProtocol.version: 2

  stalwart_cert:
    profiles: [stalwart]
    image: ghcr.io/kereis/traefik-certs-dumper:alpine
    container_name: stalwart_cert
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/traefik/ssl:/traefik:ro
      - $DATA/traefik_certs:/output
