---
services:
  lancache:
    profiles: [lancache]
    image: lancachenet/monolithic:latest
    container_name: lancache
    restart: unless-stopped
    environment:
      CACHE_DISK_SIZE: 1000g
    volumes:
      - $DATA/lancache/cache:/data/cache
      - $DATA/lancache/logs:/data/logs
    ports:
      - '${LANCACHE_IP}:80:80/tcp'
      - '${LANCACHE_IP}:443:443/tcp'

  lancache_dns:
    profiles: [lancache]
    image: lancachenet/lancache-dns:latest
    container_name: lancache_dns
    restart: unless-stopped
    environment:
      USE_GENERIC_CACHE: true
      DISABLE_RIOT: true
      LANCACHE_IP: ${LANCACHE_IP}
      UPSTREAM_DNS: ${DNS_VIP}
    ports:
      - '${LANCACHE_DNS}:53:53/udp'
      - '${LANCACHE_DNS}:53:53/tcp'

  # it did auto-detect the lancache server at LANCACHE_IP
  # dc run --rm -it lancache_prefill select-apps
  # [730,4465480,1079800,400,620,2012840]
  # dc run --rm -it lancache_prefill prefill
  lancache_prefill:
    profiles: [lancache]
    image: tpill90/steam-lancache-prefill:latest
    container_name: lancache_prefill
    restart: no
    network_mode: host
    volumes:
      - $DATA/lancache/prefill:/Config
