---
services:
  registry_docker:
    profiles: [registry]
    image: registry:2
    container_name: registry_docker
    restart: unless-stopped
    environment:
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
    networks: [traefik]
    labels:
      traefik.enable: true
      traefik.http.routers.registry_docker.rule: Host(`registry_docker.henn.dev`)
      traefik.http.routers.registry_docker.entrypoints: websecure
      traefik.http.routers.registry_docker.middlewares: hdrs@file
      traefik.http.routers.registry_docker.tls.certresolver: cf
      traefik.http.services.registry_docker.loadbalancer.server.port: 5000

