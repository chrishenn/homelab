# don't inline this config; it's used by both rack0 and rack4's blocky instances

upstreams:
  init:
    # startup behavior: {blocking, failOnError, fast}
    strategy: fast
  groups:
    default:
      - https://1.1.1.1/dns-query

  # strategy blocky uses to choose upstream servers: {parallel_best, strict, random}
  strategy: parallel_best
  timeout: 2s
  userAgent: none

bootstrapDns: 1.1.1.1

# Minimum TLS version that the DoT and DoH server use to serve those encrypted DNS requests
minTlsServeVersion: 1.3
# Determines how blocky will create outgoing connections; impacts both upstreams and lists: {dual, v4, v6}
connectIPVersion: v4

customDNS:
  customTTL: 1h
  filterUnmappedTypes: false
  mapping:
    steam.cache.lancache.net: 192.168.1.143
    lancache.steamcontent.com: 192.168.1.143

blocking:
  # Note: if the same group has both allow/denylists, allowlists take precedence
  denylists:
    ads:
      - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
  allowlists:
    ads:
      - |
        s.youtube.com
        assistant-s3-pa.googleapis.com
  clientGroupsBlock:
    default:
      - ads
  blockType: zeroIp
  blockTTL: 6h
  loading:
    refreshPeriod: 4h
    downloads:
      timeout: 5s
      attempts: 5
      cooldown: 10s
    concurrency: 4
    strategy: blocking
    maxErrorsPerSource: 5

caching:
  minTime: 20m
  maxTime: 120m
  maxItemsCount: 0
  prefetching: true
  prefetchExpires: 2h
  prefetchThreshold: 10
  prefetchMaxItemsCount: 0
  cacheTimeNegative: 30m

clientLookup:
  # this DNS resolver will be used to perform reverse DNS lookup (typically local router)
  upstream: 192.168.1.1

prometheus:
  enable: true
  path: /metrics

ports:
  dns: 53
  http: 80
  tls: 853
  dohPath: /dns-query
  # allow binding the DNS/DoT listeners to addresses not yet assigned to an interface (Linux only, via IP_FREEBIND;
  # e.g. Tailscale/WireGuard/VRRP addresses brought up after startup). No effect on wildcard binds; ignored with a
  # warning on non-Linux platforms.
  freeBind: true

log:
  # Log level: {trace, debug, info, warn, error}
  level: info
  # Log format: {text, json}
  format: text
  timestamp: true
  privacy: false

ede:
  enable: true

specialUseDomains:
  rfc6762-appendixG: true

ecs:
  useAsClient: true
  forward: true

# DNSSEC (Domain Name System Security Extensions) provides cryptographic authentication
# of DNS data to protect against cache poisoning and man-in-the-middle attacks
dnssec:
  validate: true
