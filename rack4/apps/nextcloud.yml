# documentation is not great
# couldn't get the HARP thing to work - documentation AND ui are utterly indecipherable
# otherwise, kind of miraculous

# mkdir -p $DATA/nextcloud/nextcloud_db $DATA/nextcloud/html
# docker exec -u 33 nextcloud php occ maintenance:repair --include-expensive
# docker exec -u 33 nextcloud php occ db:add-missing-indices
# docker exec -u 33 nextcloud php occ config:system:set default_phone_region --value="US"
# docker exec -u 33 nextcloud php occ config:system:set maintenance_window_start --value="1" --type=integer

# clear the logfile
# docker exec -u 33 nextcloud truncate /var/www/html/data/nextcloud.log --size 0
---
services:
  nextcloud:
    profiles: [nextcloud]
    image: nextcloud
    container_name: nextcloud
    hostname: nextcloud
    domainname: nextcloud.henn.dev
    restart: unless-stopped
    volumes:
      - $DATA/nextcloud/html:/var/www/html
    environment:
      NEXTCLOUD_ADMIN_USER: ${USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${PASS}
      NEXTCLOUD_PUBLIC_URL: https://nextcloud.chenn.dev
      NEXTCLOUD_TRUSTED_DOMAINS: 'nextcloud.henn.dev, nextcloud.chenn.dev'
      NEXTCLOUD_HOSTNAME: nextcloud.henn.dev
      NEXTCLOUD_DOMAIN: nextcloud.henn.dev

      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: nextcloud.henn.dev
      TRUSTED_PROXIES: 192.168.100.0/24

      REDIS_HOST: nextcloud_redis
      POSTGRES_HOST: nextcloud_db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks: [traefik, docker]
    labels:
      traefik.enable: true
      traefik.http.middlewares.nc_reg.redirectregex.regex: https://(.*)/.well-known/(card|cal)dav
      traefik.http.middlewares.nc_reg.redirectregex.replacement: https://$$1/remote.php/dav/
      traefik.http.middlewares.nc_reg.redirectregex.permanent: true
      traefik.http.routers.nextcloud.rule: Host(`nextcloud.henn.dev`)
      traefik.http.routers.nextcloud.entrypoints: websecure
      traefik.http.routers.nextcloud.tls.certresolver: cf
      traefik.http.routers.nextcloud.middlewares: nc_reg
      traefik.http.services.nextcloud.loadbalancer.server.port: 80
      homepage.group: File Edit, Convert
      homepage.name: NextCloud
      homepage.icon: nextcloud.png
      homepage.href: https://nextcloud.henn.dev
      homepage.description: Google Drive

  nextcloud_db:
    profiles: [nextcloud]
    image: postgres:16
    container_name: nextcloud_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
    volumes:
      - $DATA/nextcloud/nextcloud_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', 'nextcloud', '-U', 'nextcloud']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks: [traefik]

  nextcloud_redis:
    profiles: [nextcloud]
    image: redis:alpine
    restart: unless-stopped
    container_name: nextcloud_redis
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks: [traefik]

  collabora:
    profiles: [nextcloud]
    image: collabora/code:latest
    container_name: collabora
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      VIRTUAL_HOST: collabora.henn.dev
      VIRTUAL_PORT: 9980
      VIRTUAL_PROTO: https
      DONT_GEN_SSL_CERT: YES
      LC_CTYPE: C.UTF-8
      extra_params: |
        --o:ssl.enable=false \
        --o:ssl.ssl_verification=true \
        --o:ssl.termination=true \
        --o:welcome.enable=false
      dictionaries: en_US
      domain: nextcloud\.henn\.dev|collabora\.henn\.dev
      username: ${USER}
      password: ${PASS}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9980/hosting/discovery']
    networks: [traefik]
    labels:
      traefik.enable: true
      traefik.http.routers.collabora.rule: Host(`collabora.henn.dev`)
      traefik.http.routers.collabora.entrypoints: websecure
      traefik.http.routers.collabora.tls.certresolver: cf
      traefik.http.services.collabora.loadbalancer.server.port: 9980
