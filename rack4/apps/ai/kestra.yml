# to use curl to launch an execution
# curl -u <email> -X post ...
# curl will prompt for password

# SSO is enterprise-only
---
services:
  kestra:
    profiles: [kestra]
    image: kestra/kestra:latest
    container_name: kestra
    restart: unless-stopped
    user: root
    command: server standalone
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - $DATA/kestra/kestra:/app/storage
      - $DATA/kestra/tmp/:/tmp/kestra-wd
    environment:
      EMAIL: ${EMAIL}
      PASS: ${PASS}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_pg:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              username: ${EMAIL}
              password: ${PASS}
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    networks: [kestra, newt]
    labels:
      homepage.group: AI
      homepage.name: Kestra
      homepage.icon: kestra.png
      homepage.href: https://kestra.chenn.dev
      homepage.description: Workflow Orchestration

      pangolin.public-resources.kestra.name: kestra
      pangolin.public-resources.kestra.full-domain: kestra.chenn.dev
      pangolin.public-resources.kestra.protocol: http
      pangolin.public-resources.kestra.ssl: true
      pangolin.public-resources.kestra.targets[0].method: http
      pangolin.public-resources.kestra.targets[0].port: 8080
      pangolin.public-resources.kestra.auth.sso-enabled: true
      pangolin.public-resources.kestra.auth.sso-roles[0]: Member
      pangolin.public-resources.kestra.rules[0].action: pass
      pangolin.public-resources.kestra.rules[0].match: country
      pangolin.public-resources.kestra.rules[0].value: US
      pangolin.public-resources.kestra.rules[0].priority: 0
      pangolin.public-resources.kestra.rules[1].action: deny
      pangolin.public-resources.kestra.rules[1].match: country
      pangolin.public-resources.kestra.rules[1].value: ALL
      pangolin.public-resources.kestra.rules[1].priority: 10

  kestra_pg:
    profiles: [kestra]
    image: postgres:18-alpine
    container_name: kestra_pg
    restart: unless-stopped
    volumes:
      - $DATA/kestra/kestra_pg:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}']
    networks: [kestra]

networks:
  kestra:
