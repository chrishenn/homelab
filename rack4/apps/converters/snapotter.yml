services:
  snapotter:
    profiles: [snapotter]
    image: snapotter/snapotter:latest
    container_name: snapotter
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      EXTERNAL_URL: https://snapotter.chenn.dev
      TRUST_PROXY: true
      AUTH_ENABLED: true
      PUID: ${PUID}
      PGID: ${PGID}
      DEFAULT_USERNAME: ${USER}
      DEFAULT_PASSWORD: ${PASS}
      DEFAULT_THEME: dark

      DATABASE_URL: postgres://snapotter:snapotter@snapotter_db:5432/snapotter
      REDIS_URL: redis://snapotter_redis:6379

      OIDC_ENABLED: true
      OIDC_ISSUER_URL: ${OIDC}
      OIDC_CLIENT_ID: ${SNAPOTTER_OIDC_CLIENT}
      OIDC_CLIENT_SECRET: ${SNAPOTTER_OIDC_SECRET}
      OIDC_SCOPES: openid profile email groups
      OIDC_AUTO_CREATE_USERS: true
      OIDC_DEFAULT_ROLE: user
      OIDC_PROVIDER_NAME: Pocket ID
    volumes:
      - $DATA/snapotter/data:/data
    healthcheck:
      test: curl http://0.0.0.0:1349/api/v1/health
    networks: [snapotter, newt]
    labels:
      homepage.group: Converters
      homepage.name: Snap Otter
      homepage.icon: https://github.com/snapotter-hq/SnapOtter/blob/main/apps/web/public/logo.png?raw=true
      homepage.href: https://snapotter.chenn.dev
      homepage.description: Image Converters

      pangolin.public-resources.snapotter.name: snapotter
      pangolin.public-resources.snapotter.full-domain: snapotter.chenn.dev
      pangolin.public-resources.snapotter.mode: http
      pangolin.public-resources.snapotter.targets[0].method: http
      pangolin.public-resources.snapotter.targets[0].port: 1349
      pangolin.public-resources.snapotter.policy: member

  snapotter_db:
    profiles: [snapotter]
    image: postgres:18-alpine
    container_name: snapotter_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: snapotter
      POSTGRES_PASSWORD: snapotter
      POSTGRES_DB: snapotter
    volumes:
      - $DATA/snapotter/db:/var/lib/postgresql
    networks: [snapotter]

  snapotter_redis:
    profiles: [snapotter]
    image: valkey/valkey:alpine
    container_name: snapotter_redis
    restart: unless-stopped
    volumes:
      - $DATA/snapotter/redis:/data
    networks: [snapotter]

networks:
  snapotter:
