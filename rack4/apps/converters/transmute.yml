---
services:
  transmute:
    profiles: [transmute]
    image: ghcr.io/transmute-app/transmute:main
    container_name: transmute
    restart: unless-stopped
    volumes:
      - $DATA/transmute:/app/data
    healthcheck:
      test: wget -q --tries=1 http://0.0.0.0:3319/api/health/ready
#      test: ["CMD-SHELL", "curl -f http://0.0.0.0:3319/api/health/ready"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks: [traefik]
    labels:
      homepage.group: File Converters
      homepage.name: Transmute
      homepage.icon: vertiv.png
      homepage.href: https://transmute.chenn.dev
      homepage.description: File Converters

      pangolin.public-resources.transmute.name: transmute
      pangolin.public-resources.transmute.protocol: http
      pangolin.public-resources.transmute.full-domain: transmute.chenn.dev
      pangolin.public-resources.transmute.ssl: true
      pangolin.public-resources.transmute.targets[0].method: http
      pangolin.public-resources.transmute.targets[0].port: 3313
      pangolin.public-resources.transmute.auth.sso-enabled: true
      pangolin.public-resources.transmute.auth.sso-roles[0]: Member
      pangolin.public-resources.transmute.rules[0].action: pass
      pangolin.public-resources.transmute.rules[0].match: country
      pangolin.public-resources.transmute.rules[0].value: US
      pangolin.public-resources.transmute.rules[0].priority: 0
      pangolin.public-resources.transmute.rules[1].action: deny
      pangolin.public-resources.transmute.rules[1].match: country
      pangolin.public-resources.transmute.rules[1].value: ALL
      pangolin.public-resources.transmute.rules[1].priority: 10
