  stoat_voice:
    profiles: [stoat]
    image: ghcr.io/stoatchat/voice-ingress:v0.13.7
    container_name: stoat_voice
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    depends_on:
      stoat_db:
        condition: service_healthy
      stoat_mq:
        condition: service_healthy
    networks: [stoat]

  stoat_crond:
    profiles: [stoat]
    image: ghcr.io/stoatchat/crond:v0.13.7
    container_name: stoat_crond
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    depends_on:
      stoat_db:
        condition: service_healthy
      stoat-s3:
        condition: service_started
    networks: [stoat]

  stoat_pushd:
    profiles: [stoat]
    image: ghcr.io/stoatchat/pushd:v0.13.7
    container_name: stoat_pushd
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    depends_on:
      stoat_db:
        condition: service_healthy
      stoat_redis:
        condition: service_started
      stoat_mq:
        condition: service_healthy
    networks: [stoat]

  stoat_db:
    profiles: [stoat]
    image: mongo:8
    container_name: stoat_db
    restart: unless-stopped
    environment:
      GLIBC_TUNABLES: 'glibc.cpu.hwcaps=-SHSTK'
    volumes:
      - $DATA/stoat/db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks: [stoat]

  stoat_redis:
    profiles: [stoat]
    image: valkey/valkey:alpine
    container_name: stoat_redis
    restart: unless-stopped
    networks: [stoat]

  stoat_mq:
    profiles: [stoat]
    image: rabbitmq:4-alpine
    container_name: stoat_mq
    restart: unless-stopped
    environment:
      <<: *stoat_mq
    volumes:
      - $DATA/stoat/rabbit:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [stoat]

  stoat-s3:
    profiles: [stoat]
    image: rustfs/rustfs:latest
    container_name: stoat-s3
    restart: unless-stopped
    command: /data
    environment:
      <<: *stoat_s3
    volumes:
      - $DATA/stoat/s3:/data
    healthcheck:
      test: curl -f http://localhost:9000/health
      timeout: 5s
      retries: 10
      start_period: 15s
      interval: 5s
    depends_on:
      stoat-s3_perm:
        condition: service_completed_successfully
    networks:
      stoat:
        aliases:
          - revolt-uploads.stoat-s3

  stoat-s3_perm:
    profiles: [stoat]
    image: alpine
    container_name: stoat-s3_perm
    restart: no
    user: root
    volumes:
      - $DATA/stoat/s3:/data
    command: chown -R 10001:10001 /data

  stoat-s3_bucket:
    profiles: [stoat]
    image: minio/mc
    container_name: stoat-s3_bucket
    restart: no
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        until mc alias set rustfs http://stoat-s3:9000 minioautumn minioautumn; do
          echo 'waiting to connect to stoat-s3'
          sleep 2
        done
        mc mb rustfs/revolt-uploads --ignore-existing
    depends_on:
      stoat-s3:
        condition: service_healthy
    networks: [stoat]

networks:
  stoat:
