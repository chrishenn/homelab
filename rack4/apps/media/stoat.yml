# rabbitmq idle cpu usage average ~6% of 32 cores AT IDLE. WHAT IS IT DOING
---
configs:
  stoat_toml:
    content: |
      [database]
      mongodb = "mongodb://stoat_db:27017"
      redis = "redis://stoat_redis:6379"

      [rabbit]
      host = "stoat_mq"
      port = 5672
      username = "rabbituser"
      password = "rabbitpass"

      [files.s3]
      endpoint = "http://stoat-s3:9000"
      region = "stoat-s3"
      access_key_id = "minioautumn"
      secret_access_key = "minioautumn"
      default_bucket = "revolt-uploads"

      [api.registration]
      invite_only = true

      [api.smtp]
      host = "${SMTP_HOST}"
      username = "${SMTP_USER}"
      password = "${SMTP_TOKEN}"
      from_address = "${SMTP_USER}"
      reply_to = "${SMTP_USER}"
      port = 465
      use_tls = true
      use_starttls = false

      [hosts]
      app = "https://stoat.chenn.dev"
      api = "https://stoat.chenn.dev/api"
      events = "wss://stoat.chenn.dev/ws"
      autumn = "https://stoat.chenn.dev/autumn"
      january = "https://stoat.chenn.dev/january"

      [pushd.vapid]
      private_key = "${STOAT_VAPID_PRIVATE_KEY}"
      public_key = "${STOAT_VAPID_PUBLIC_KEY}"

      [files]
      encryption_key = "${STOAT_ENCRYPTION_KEY}"

      [hosts.livekit]
      worldwide = "wss://stoat.chenn.dev/livekit"

      [api.livekit.nodes.worldwide]
      url = "http://stoat_livekit:7880"
      lat = 0.0
      lon = 0.0
      key = "${STOAT_LIVEKIT_KEY}"
      secret = "${STOAT_LIVEKIT_SECRET}"

      [features.limits.new_user]
      video_resolution = [3840, 2160]
      video_aspect_ratio = [0.3, 10]

      [features.limits.default]
      video_resolution = [3840, 2160]
      video_aspect_ratio = [0.3, 10]

  stoat_caddy:
    content: |
      {$$HOSTNAME} {
          route /api* {
              uri strip_prefix /api
              reverse_proxy http://stoat_api:14702 {
                  header_down Location "^/" "/api/"
              }
          }
          route /ws {
              uri strip_prefix /ws
              reverse_proxy http://stoat_events:14703 {
                  header_down Location "^/" "/ws/"
              }
          }
          route /autumn* {
              uri strip_prefix /autumn
              reverse_proxy http://stoat_autumn:14704 {
                  header_down Location "^/" "/autumn/"
              }
          }
          route /january* {
              uri strip_prefix /january
              reverse_proxy http://stoat_january:14705 {
                  header_down Location "^/" "/january/"
              }
          }
          route /gifbox* {
              uri strip_prefix /gifbox
              reverse_proxy http://stoat_gifbox:14706 {
                  header_down Location "^/" "/gifbox/"
              }
          }
          route /livekit* {
              uri strip_prefix /livekit
              reverse_proxy http://stoat_livekit:7880 {
                  header_down Location "^/" "/livekit/"
              }
          }
          route /ingress* {
              uri strip_prefix /ingress
              reverse_proxy http://stoat_voice:8500 {
                  header_down Location "^/" "/ingress/"
              }
          }
          reverse_proxy http://stoat_web:5000
      }

  stoat_livekit:
    content: |
      rtc:
        use_external_ip: false
        port_range_start: 50000
        port_range_end: 50039
        tcp_port: 7881
      redis:
        address: stoat_redis:6379
      turn:
        enabled: false
      keys:
        ${STOAT_LIVEKIT_KEY}: ${STOAT_LIVEKIT_SECRET}
      webhook:
        api_key: ${STOAT_LIVEKIT_KEY}
        urls:
          - "http://stoat_voice:8500/worldwide"

x-stoat_web: &stoat_web
  HOSTNAME: :80
  REVOLT_PUBLIC_URL: https://stoat.chenn.dev/api
  VITE_API_URL: https://stoat.chenn.dev/api
  VITE_WS_URL: wss://stoat.chenn.dev/ws
  VITE_MEDIA_URL: https://stoat.chenn.dev/autumn
  VITE_PROXY_URL: https://stoat.chenn.dev/january
  VITE_CFG_ENABLE_VIDEO: true

x-stoat_mq: &stoat_mq
  RABBITMQ_DEFAULT_USER: rabbituser
  RABBITMQ_DEFAULT_PASS: rabbitpass

x-stoat_s3: &stoat_s3
  RUSTFS_ACCESS_KEY: minioautumn
  RUSTFS_SECRET_KEY: minioautumn
  RUSTFS_SERVER_DOMAINS: stoat-s3

services:
  stoat_caddy:
    profiles: [stoat]
    image: caddy
    container_name: stoat_caddy
    restart: unless-stopped
    environment:
      <<: *stoat_web
    configs:
      - source: stoat_caddy
        target: /etc/caddy/Caddyfile
    volumes:
      - $DATA/stoat/caddy-data:/data
      - $DATA/stoat/caddy-config:/config
    networks: [stoat, newt]
    labels:
      homepage.group: General Media
      homepage.name: Stoat
      homepage.icon: stoat.png
      homepage.href: https://stoat.chenn.dev
      homepage.description: Private Discord

      pangolin.public-resources.stoat.name: stoat
      pangolin.public-resources.stoat.full-domain: stoat.chenn.dev
      pangolin.public-resources.stoat.protocol: http
      pangolin.public-resources.stoat.ssl: true
      pangolin.public-resources.stoat.targets[0].method: http
      pangolin.public-resources.stoat.targets[0].port: 80

  stoat_web:
    profiles: [stoat]
    image: ghcr.io/stoatchat/for-web:c4a9ac2
    container_name: stoat_web
    restart: unless-stopped
    environment:
      <<: *stoat_web
    networks: [stoat]

  stoat_api:
    profiles: [stoat]
    image: ghcr.io/stoatchat/api:v0.13.7
    container_name: stoat_api
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    depends_on:
      stoat_db:
        condition: service_healthy
      stoat_redis:
        condition: service_started
      stoat_mq:
        condition: service_healthy
    networks: [stoat]

  stoat_events:
    profiles: [stoat]
    image: ghcr.io/stoatchat/events:v0.13.7
    container_name: stoat_events
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    depends_on:
      stoat_db:
        condition: service_healthy
      stoat_redis:
        condition: service_started
    networks: [stoat]

  stoat_autumn:
    profiles: [stoat]
    image: ghcr.io/stoatchat/file-server:v0.13.7
    container_name: stoat_autumn
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    depends_on:
      stoat_db:
        condition: service_healthy
      stoat-s3_bucket:
        condition: service_started
    networks: [stoat]

  stoat_january:
    profiles: [stoat]
    image: ghcr.io/stoatchat/proxy:v0.13.7
    container_name: stoat_january
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    networks: [stoat]

  stoat_gifbox:
    profiles: [stoat]
    image: ghcr.io/stoatchat/gifbox:v0.13.7
    container_name: stoat_gifbox
    restart: unless-stopped
    configs:
      - source: stoat_toml
        target: /Revolt.toml
    networks: [stoat]

  stoat_livekit:
    profiles: [stoat]
    image: ghcr.io/stoatchat/livekit-server:v1.9.13
    container_name: stoat_livekit
    restart: unless-stopped
    configs:
      - source: stoat_livekit
        target: /etc/livekit.yml
    command: --config /etc/livekit.yml --node-ip ${VPS0_IP}
    depends_on:
      stoat_redis:
        condition: service_started
    networks: [stoat, newt]
    labels:
