---
services:
  jellyseerr:
    profiles: [jellyseerr]
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    environment:
      TZ: $TZ
      LOG_LEVEL: debug
    volumes:
      - $DATA/jellyseerr:/app/config
    healthcheck:
      test: ['CMD-SHELL', 'apk add curl && curl -ILfSs http://localhost:5055']
    networks: [traefik]
    labels:
      homepage.group: Media
      homepage.name: Jellyseer
      homepage.icon: jellyseerr.png
      homepage.href: https://jellyseerr.chenn.dev
      homepage.description: Media Requests

      traefik.enable: true
      traefik.http.routers.jellyseerr.rule: Host(`jellyseerr.henn.dev`)
      traefik.http.routers.jellyseerr.entrypoints: websecure
      traefik.http.routers.jellyseerr.middlewares: hdrs@file
      traefik.http.routers.jellyseerr.tls.certresolver: cf
      traefik.http.services.jellyseerr.loadbalancer.server.port: 5055

      pangolin.public-resources.jellyseerr.name: jellyseerr
      pangolin.public-resources.jellyseerr.protocol: http
      pangolin.public-resources.jellyseerr.full-domain: jellyseerr.chenn.dev
      pangolin.public-resources.jellyseerr.ssl: true
      pangolin.public-resources.jellyseerr.targets[0].method: http
      pangolin.public-resources.jellyseerr.targets[0].port: 5055
      pangolin.public-resources.jellyseerr.targets[0].healthcheck.enabled: true
      pangolin.public-resources.jellyseerr.targets[0].healthcheck.hostname: jellyseerr
      pangolin.public-resources.jellyseerr.targets[0].healthcheck.port: 5055
      pangolin.public-resources.jellyseerr.targets[0].healthcheck.path: /
      pangolin.public-resources.jellyseerr.auth.sso-enabled: true
      pangolin.public-resources.jellyseerr.auth.sso-roles[0]: Member
      pangolin.public-resources.jellyseerr.rules[0].action: pass
      pangolin.public-resources.jellyseerr.rules[0].match: country
      pangolin.public-resources.jellyseerr.rules[0].value: US
      pangolin.public-resources.jellyseerr.rules[0].priority: 0
      pangolin.public-resources.jellyseerr.rules[1].action: deny
      pangolin.public-resources.jellyseerr.rules[1].match: country
      pangolin.public-resources.jellyseerr.rules[1].value: ALL
      pangolin.public-resources.jellyseerr.rules[1].priority: 10
