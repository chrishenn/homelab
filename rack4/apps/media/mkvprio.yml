# can be set up with a cron job to auto scan and update MKV's in your library
---
services:
  mkvprio:
    profiles: [mkvprio]
    image: ghcr.io/kennethsible/mkvpriority
    container_name: mkvprio
    restart: unless-stopped
    environment:
      WEBHOOK_PORT: '8080'
      MKVPRIORITY_ARGS: --archive /config/archive.db

      TZ: $TZ
      # CRON_SCHEDULE: "0 0 * * *"
      # CRON_TARGET_PATHS: /media

      # RADARR_URL: ${RADARR_URL}
      # RADARR_API_KEY: ${RADARR_KEY}
      # SONARR_URL: ${SONARR_URL}
      # SONARR_API_KEY: ${SONARR_KEY}

    volumes:
      # mount media to scan here - still needed when using radarr api?
      - $DATA/mkvprio/media:/media
      - ./mkvprio:/config
