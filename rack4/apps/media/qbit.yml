# default user/pass: admin/{printed in the container logs}
---
services:
  qui:
    profiles: [qbit]
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    restart: unless-stopped
    environment:
      QUI__OIDC_ISSUER: $OIDC
      QUI__OIDC_ENABLED: true
      QUI__OIDC_CLIENT_ID: $QUI_OIDC_CLIENT
      QUI__OIDC_CLIENT_SECRET: $QUI_OIDC_SECRET
      QUI__OIDC_REDIRECT_URL: https://qui.chenn.dev/api/auth/oidc/callback
      QUI__OIDC_DISABLE_BUILT_IN_LOGIN: true
    volumes:
      - $DATA/qui/config:/config
      - $DATA/qui/torrents:/data/torrents
      - $DATA/qbit/downloads:/qbit/downloads
      - $DATA/qbit_novpn:/qbit_novpn/downloads
    healthcheck:
      test: ['CMD', 'wget', '-qO', '--no-verbose', 'http://localhost:7476']
    networks: [traefik]
    labels:
      homepage.group: Media
      homepage.name: Qui
      homepage.icon: qui.png
      homepage.href: https://qui.chenn.dev
      homepage.description: Bittorrent GUI

      traefik.enable: true
      traefik.http.routers.qui.rule: Host(`qui.henn.dev`)
      traefik.http.routers.qui.entrypoints: websecure
      traefik.http.routers.qui.middlewares: hdrs@file
      traefik.http.routers.qui.tls.certresolver: cf
      traefik.http.services.qui.loadbalancer.server.port: 7476

      pangolin.public-resources.qui.name: qui
      pangolin.public-resources.qui.full-domain: qui.chenn.dev
      pangolin.public-resources.qui.protocol: http
      pangolin.public-resources.qui.ssl: true
      pangolin.public-resources.qui.targets[0].method: http
      pangolin.public-resources.qui.targets[0].port: 7476
      pangolin.public-resources.qui.auth.sso-enabled: true
      pangolin.public-resources.qui.auth.sso-users[0]: ${EMAIL}
      pangolin.public-resources.qui.auth.sso-users[1]: ${USER1}
      pangolin.public-resources.qui.rules[0].action: pass
      pangolin.public-resources.qui.rules[0].match: country
      pangolin.public-resources.qui.rules[0].value: US
      pangolin.public-resources.qui.rules[0].priority: 0
      pangolin.public-resources.qui.rules[1].action: deny
      pangolin.public-resources.qui.rules[1].match: country
      pangolin.public-resources.qui.rules[1].value: ALL
      pangolin.public-resources.qui.rules[1].priority: 10

  gluetun:
    profiles: [qbit]
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    hostname: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
      Timezone: $TZ
      UPDATER_PERIOD: 24h
      VPN_TYPE: wireguard
      VPN_SERVICE_PROVIDER: protonvpn
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: 'United States,Canada'
    networks: [traefik]
    labels:
      homepage.instance.private.group: Media
      homepage.instance.private.name: Gluetun
      homepage.instance.private.icon: gluetun.png
      homepage.instance.private.description: Qbittorrent VPN Tunnel

      traefik.enable: true
      traefik.http.routers.qbit.rule: Host(`vpn.qbit.henn.dev`)
      traefik.http.routers.qbit.entrypoints: websecure
      traefik.http.routers.qbit.middlewares: hdrs@file
      traefik.http.routers.qbit.tls.certresolver: cf
      traefik.http.services.qbit.loadbalancer.server.port: 8080
    ports:
      - '6888:6888/tcp'
      - '6888:6888/udp'
      - '8388:8388/tcp'
      - '8388:8388/udp'
      - '8888:8888/tcp'
      - '51413:51413/tcp'
      - '51413:51413/udp'

  qbit_vpn:
    profiles: [qbit]
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbit_vpn
    restart: unless-stopped
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/qbit/config:/config
      - $DATA/qbit/downloads:/qbit/downloads
    network_mode: service:gluetun
    labels:
      homepage.instance.private.group: Media
      homepage.instance.private.name: Qbittorrent (VPN)
      homepage.instance.private.icon: qbittorrent.png
      homepage.instance.private.href: https://vpn.qbit.henn.dev
      homepage.instance.private.description: VPN Torrents

  qbit_novpn:
    profiles: [qbit]
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbit_novpn
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/qbit_novpn:/config
      - $DATA/qbit_novpn:/qbit_novpn/downloads
    networks: [traefik]
    labels:
      homepage.instance.private.group: Media
      homepage.instance.private.name: QBittorrent (No VPN)
      homepage.instance.private.icon: qbittorrent.png
      homepage.instance.private.href: https://novpn.qbit.henn.dev
      homepage.instance.private.description: Non-Vpn Torrents

      traefik.enable: true
      traefik.http.routers.qbit_novpn.rule: Host(`novpn.qbit.henn.dev`)
      traefik.http.routers.qbit_novpn.entrypoints: websecure
      traefik.http.routers.qbit_novpn.middlewares: hdrs@file
      traefik.http.routers.qbit_novpn.tls.certresolver: cf
      traefik.http.services.qbit_novpn.loadbalancer.server.port: 8080
