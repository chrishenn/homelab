---
services:
  # j ark init --setup
  # j ark add --depth=1 'https://tory110191.wordpress.com'
  # j ark add --update-all --depth=1 'https://tory110191.wordpress.com'
  # j ark schedule --add --every=day --depth=1 'https://tory110191.wordpress.com'

  # sudo chown -R 911:911 /var/home/chris/.config/google-chrome
  # j ark update --overwrite 'https://tory110191.wordpress.com/2009/01/27/day-6-2/'
  archive:
    profiles: [archive]
    image: archivebox/archivebox:stable
    container_name: archive
    shm_size: '1gb'
    environment:
      ADMIN_USERNAME: ${USER}
      ADMIN_PASSWORD: ${PASS}
      SERVER_SECURITY_MODE: danger-onedomain-fullreplay
      CHROME_USER_DATA_DIR: /profiles

      CHROME_ENABLED: true
      GIT_ENABLED: true
      GALLERYDL_ENABLED: true
      FORUMDL_ENABLED: true
      FAVICON_ENABLED: true
      UBLOCK_ENABLED: true
      ISTILLDONTCAREABOUTCOOKIES_ENABLED: true
      MODALCLOSER_ENABLED: true
      STATICFILE_ENABLED: true
      PAPERSDL_ENABLED: true
      URL_ALLOWLIST: '^https:\/\/tory110191\.wordpress\.com.*$'
    volumes:
      - $DATA/archive/data:/data
      - /var/home/chris/.config/google-chrome:/profiles
    networks: [newt]
    labels:
      homepage.group: General Media
      homepage.name: Archivebox
      homepage.icon: archivebox.png
      homepage.href: https://archive.chenn.dev
      homepage.description: Web Archive

      pangolin.public-resources.archive.name: archive
      pangolin.public-resources.archive.full-domain: archive.chenn.dev
      pangolin.public-resources.archive.mode: http
      pangolin.public-resources.archive.targets[0].method: http
      pangolin.public-resources.archive.targets[0].port: 8000
      pangolin.public-resources.archive.policy: member

