---
services:
  # dc run archive add --depth=1 'https://news.ycombinator.com'
  # dc run archive schedule --add --every=day --depth=1 'https://example.com/some/rss/feed.xml'
  # https://github.com/ArchiveBox/ArchiveBox/wiki/Chromium-Install#setting-up-a-chromium-user-profile
  archive:
    profiles: [archive]
    image: archivebox/archivebox:dev
    container_name: archive
    shm_size: "1gb"
    environment:
      ADMIN_USERNAME: ${USER}
      ADMIN_PASSWORD: ${PASS}
      BASE_URL: https://archive.chenn.dev
      SERVER_SECURITY_MODE: safe-subdomains-fullreplay
    volumes:
      - $DATA/archive/data:/data
    networks: [newt]
    labels:
      homepage.group: General Media
      homepage.name: Archivebox
      homepage.icon: archivebox.png
      homepage.href: https://archive.chenn.dev
      homepage.description: Web Archive

      pangolin.public-resources.archive.name: archive
      pangolin.public-resources.archive.full-domain: archive.chenn.dev
      pangolin.public-resources.archive.mode: http
      pangolin.public-resources.archive.targets[0].method: http
      pangolin.public-resources.archive.targets[0].port: 8000
      pangolin.public-resources.archive.policy: member

