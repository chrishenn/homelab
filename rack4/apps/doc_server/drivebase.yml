---
configs:
  drivebase:
    content: |
      [server]
      env = "prod"
      port = 4000
      host = "0.0.0.0"

      [db]
      url = "postgres://drivebase:drivebase@drivebase_db:5432/drivebase?sslmode=disable"

      [redis]
      url = "redis://drivebase_redis:6379/0"

      [crypto]
      masterKeyBase64 = "${DRIVEBASE_MASTER}"

      [auth]
      betterAuthSecret = "${DRIVEBASE_BETTER}"
      baseUrl = "https://drivebase.chenn.dev"
      trustedOrigins = ["http://localhost:1558", "https://drivebase.chenn.dev"]

      [cache]
      childrenTtlSeconds = 60
      usageTtlSeconds = 600

      [workers.concurrency]
      upload = 4
      download = 4
      transfer = 4
      copy = 4
      move = 4
      delete = 4
      syncReconcile = 1
      usageRefresh = 1

      [log]
      level = "info"

services:
  drivebase:
    profiles: [drivebase]
    image: ghcr.io/drivebase/drivebase:v4.0.0-alpha.8
    container_name: drivebase
    restart: unless-stopped
    configs:
      - source: drivebase
        target: /app/config.toml
    volumes:
      - $DATA/drivebase/data:/app/data
      - /mnt/h:/mnt/h
    networks: [drivebase, newt]
    labels:
      homepage.group: File Servers
      homepage.name: Drivebase
      homepage.icon: https://github.com/drivebase/drivebase/blob/main/packages/apps/files/src/icon.png?raw=true
      homepage.href: https://drivebase.chenn.dev
      homepage.description: File Server

      pangolin.public-resources.drivebase.name: drivebase
      pangolin.public-resources.drivebase.full-domain: drivebase.chenn.dev
      pangolin.public-resources.drivebase.protocol: http
      pangolin.public-resources.drivebase.ssl: true
      pangolin.public-resources.drivebase.targets[0].method: http
      pangolin.public-resources.drivebase.targets[0].port: 80
      pangolin.public-resources.drivebase.auth.sso-enabled: true
      pangolin.public-resources.drivebase.auth.sso-roles[0]: Member
      pangolin.public-resources.drivebase.rules[0].action: pass
      pangolin.public-resources.drivebase.rules[0].match: country
      pangolin.public-resources.drivebase.rules[0].value: US
      pangolin.public-resources.drivebase.rules[1].action: deny
      pangolin.public-resources.drivebase.rules[1].match: country
      pangolin.public-resources.drivebase.rules[1].value: ALL

  drivebase_db:
    profiles: [drivebase]
    image: pgvector/pgvector:pg18
    container_name: drivebase_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: drivebase
      POSTGRES_PASSWORD: drivebase
      POSTGRES_DB: drivebase
    volumes:
      - $DATA/drivebase/db:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U drivebase']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [drivebase]

  drivebase_redis:
    profiles: [drivebase]
    image: redis:8-alpine
    container_name: drivebase_redis
    restart: unless-stopped
    volumes:
      - $DATA/drivebase/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [drivebase]

networks:
  drivebase:
