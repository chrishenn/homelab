services:
  zipline:
    profiles: [zipline]
    image: ghcr.io/diced/zipline:latest
    container_name: zipline
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://zipline:zipline@zipline_db:5432/zipline
      POSTGRESQL_PASSWORD: zipline
      CORE_SECRET: AUPlPfqKHEzbSNyRAwHJ9X3InQKvoXDZ
    volumes:
      - $DATA/zipline/uploads:/zipline/uploads
      - $DATA/zipline/public:/zipline/public
      - $DATA/zipline/themes:/zipline/themes
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://0.0.0.0:3000/api/healthcheck']
      interval: 15s
      timeout: 2s
      retries: 2
    networks: [zipline, newt]
    labels:
      homepage.group: File Servers
      homepage.name: Zipline
      homepage.icon: zipline.png
      homepage.href: https://zipline.chenn.dev
      homepage.description: File Sharing

      pangolin.public-resources.zipline.name: zipline
      pangolin.public-resources.zipline.full-domain: zipline.chenn.dev
      pangolin.public-resources.zipline.mode: http
      pangolin.public-resources.zipline.targets[0].method: http
      pangolin.public-resources.zipline.targets[0].port: 3000
      pangolin.public-resources.zipline.policy: member

  zipline_db:
    profiles: [zipline]
    image: postgres:18-alpine
    container_name: zipline_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zipline
      POSTGRES_PASSWORD: zipline
      POSTGRES_DB: zipline
    volumes:
      - $DATA/zipline/db:/var/lib/postgresql
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'zipline']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [zipline]

networks:
  zipline:
