---
services:
  syncthing:
    profiles: [syncthing]
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - $DATA/syncthing/config:/config
      - /mnt/h/filen:/mnt/h/filen
    ports:
      - '22000:22000/tcp'
      - '22000:22000/udp'
      - '21027:21027/udp'
    networks: [newt]
    labels:
      homepage.group: File Servers
      homepage.name: Syncthing
      homepage.icon: syncthing.png
      homepage.href: https://syncthing.chenn.dev
      homepage.description: File Sync

      pangolin.public-resources.syncthing.name: syncthing
      pangolin.public-resources.syncthing.full-domain: syncthing.chenn.dev
      pangolin.public-resources.syncthing.mode: http
      pangolin.public-resources.syncthing.targets[0].method: http
      pangolin.public-resources.syncthing.targets[0].port: 8384
      pangolin.public-resources.syncthing.policy: chris
