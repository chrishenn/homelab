# mkdir -p $DATA/paperless/data $DATA/paperless/media $DATA/paperless/export $DATA/paperless/consume \
# $DATA/paperless/paperless_ai $DATA/paperless/paperless_gpt $DATA/paperless/paperless_postgres $DATA/paperless/paperless_redis
---
services:
  paperless:
    profiles: [paperless]
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PAPERLESS_TIME_ZONE: ${TZ}

      PAPERLESS_URL: https://paperless.chenn.dev
      PAPERLESS_REDIS: redis://paperless_redis:6379
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_OCR_LANGUAGE: eng

      PAPERLESS_DBHOST: paperless_postgres
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless

      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless_gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://paperless_tika:9998
    volumes:
      - $DATA/paperless/data:/usr/src/paperless/data
      - $DATA/paperless/media:/usr/src/paperless/media
      - $DATA/paperless/export:/usr/src/paperless/export
      - $DATA/paperless/consume:/usr/src/paperless/consume
    networks: [paperless, newt]
    labels:
      homepage.group: File Servers
      homepage.name: Paperless
      homepage.icon: paperless.png
      homepage.href: https://paperless.chenn.dev
      homepage.description: Document Organization

      pangolin.public-resources.paperless.name: paperless
      pangolin.public-resources.paperless.full-domain: paperless.chenn.dev
      pangolin.public-resources.paperless.mode: http
      pangolin.public-resources.paperless.targets[0].method: http
      pangolin.public-resources.paperless.targets[0].port: 8000
      pangolin.public-resources.paperless.policy: member

  paperless_ai:
    profiles: [paperless]
    image: clusterzx/paperless-ai
    container_name: paperless_ai
    restart: unless-stopped
    environment:
      TZ: ${TZ}

      AI_PROVIDER: ollama
      OLLAMA_API_URL: http://ollama:11434
      OLLAMA_MODEL: deepseek-r1:14b

      PAPERLESS_URL: http://paperless:8000
      PAPERLESS_API_TOKEN: ${PAPERLESS_TOKEN}
      PAPERLESS_USERNAME: ${USER}

      RAG_SERVICE_URL: http://localhost:8000
      RAG_SERVICE_ENABLED: true
      SCAN_INTERVAL: '*/30 * * * *'

    volumes:
      - $DATA/paperless/paperless_ai:/app/data
    networks: [paperless, newt, ollama]
    labels:
      homepage.group: File Servers
      homepage.name: Paperless AI
      homepage.icon: paperless.png
      homepage.href: https://paperless_ai.chenn.dev
      homepage.description: AI Document Processing

      pangolin.public-resources.paperless_ai.name: paperless_ai
      pangolin.public-resources.paperless_ai.full-domain: paperless-ai.chenn.dev
      pangolin.public-resources.paperless_ai.mode: http
      pangolin.public-resources.paperless_ai.targets[0].method: http
      pangolin.public-resources.paperless_ai.targets[0].port: 3000
      pangolin.public-resources.paperless_ai.policy: member

  paperless_gpt:
    profiles: [paperless]
    image: icereed/paperless-gpt:latest
    container_name: paperless_gpt
    restart: unless-stopped
    environment:
      PAPERLESS_BASE_URL: http://paperless:8000
      PAPERLESS_API_TOKEN: ${PAPERLESS_TOKEN}
      PAPERLESS_PUBLIC_URL: https://paperless.chenn.dev
      PDF_UPLOAD: false
      LOG_LEVEL: DEBUG

      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CONTEXT_LENGTH: 8192
      TOKEN_LIMIT: 1000

      LLM_PROVIDER: ollama
      LLM_MODEL: deepseek-r1:14b
      LLM_LANGUAGE: English
      OCR_PROVIDER: llm

      VISION_LLM_PROVIDER: ollama
      VISION_LLM_MODEL: minicpm-v:8b

      AUTO_OCR_TAG: ocr
      AUTO_TAG: ai
      MANUAL_TAG: ai_manual
      PDF_OCR_TAGGING: true
      PDF_OCR_COMPLETE_TAG: paperless-gpt-ocr-complete
    volumes:
      - $DATA/paperless/paperless_gpt:/app/prompts
    networks: [paperless, newt, ollama]
    labels:
      homepage.group: File Servers
      homepage.name: Paperless GPT
      homepage.icon: paperless.png
      homepage.href: https://paperless_gpt.chenn.dev
      homepage.description: AI Document Processing

      pangolin.public-resources.paperless_gpt.name: paperless_gpt
      pangolin.public-resources.paperless_gpt.full-domain: paperless-gpt.chenn.dev
      pangolin.public-resources.paperless_gpt.mode: http
      pangolin.public-resources.paperless_gpt.targets[0].method: http
      pangolin.public-resources.paperless_gpt.targets[0].port: 8080
      pangolin.public-resources.paperless_gpt.policy: member

  paperless_postgres:
    profiles: [paperless]
    image: postgres:18-alpine
    restart: unless-stopped
    container_name: paperless_postgres
    environment:
      TZ: ${TZ}
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless
    volumes:
      - $DATA/paperless/paperless_postgres:/var/lib/postgresql
    networks: [paperless]

  paperless_redis:
    profiles: [paperless]
    image: valkey/valkey:alpine
    container_name: paperless_redis
    restart: unless-stopped
    volumes:
      - $DATA/paperless/redis:/data
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [paperless]

  paperless_tika:
    profiles: [paperless]
    image: apache/tika:latest
    container_name: paperless_tika
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    networks: [paperless]

  paperless_gotenberg:
    profiles: [paperless]
    image: gotenberg/gotenberg:8
    container_name: paperless_gotenberg
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    command:
      - 'gotenberg'
      - '--chromium-disable-javascript=true'
      - '--chromium-allow-list=file:///tmp/.*'
    networks: [paperless]

networks:
  paperless:
