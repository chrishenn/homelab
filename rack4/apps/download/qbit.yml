---
services:
  qbit_vpn:
    profiles: [download]
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbit_vpn
    restart: unless-stopped
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/qbit/config:/config
      - $DATA/qbit/downloads:/qbit/downloads
    depends_on:
      - gluetun
    network_mode: service:gluetun
    labels:
      homepage.group: Download
      homepage.name: Qbittorrent (VPN)
      homepage.icon: qbittorrent.png
      homepage.href: https://vpn.qbit.chenn.dev
      homepage.description: VPN Torrents

  gluetun:
    profiles: [download]
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    hostname: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID

      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: 'United States,Canada'
      WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL: 60s
    networks: [traefik, arr, newt]
    labels:
      homepage.group: Download
      homepage.name: Gluetun
      homepage.icon: gluetun.png
      homepage.description: Qbittorrent VPN Tunnel

      traefik.enable: true
      traefik.http.routers.qbit.rule: Host(`vpn.qbit.henn.dev`)
      traefik.http.routers.qbit.entrypoints: websecure
      traefik.http.routers.qbit.middlewares: hdrs@file
      traefik.http.routers.qbit.tls.certresolver: cf
      traefik.http.services.qbit.loadbalancer.server.port: 8080

      pangolin.public-resources.qbit.name: qbit
      pangolin.public-resources.qbit.full-domain: vpn.qbit.chenn.dev
      pangolin.public-resources.qbit.protocol: http
      pangolin.public-resources.qbit.ssl: true
      pangolin.public-resources.qbit.targets[0].method: http
      pangolin.public-resources.qbit.targets[0].port: 8080
      pangolin.public-resources.qbit.auth.sso-enabled: true
      pangolin.public-resources.qbit.auth.sso-roles[0]: Member
      pangolin.public-resources.qbit.auth.basic-auth.user: ${ARR_PANGOLIN_AUTH_USER}
      pangolin.public-resources.qbit.auth.basic-auth.password: ${ARR_PANGOLIN_AUTH_PASS}
      pangolin.public-resources.qbit.rules[0].action: pass
      pangolin.public-resources.qbit.rules[0].match: country
      pangolin.public-resources.qbit.rules[0].value: US
      pangolin.public-resources.qbit.rules[1].action: deny
      pangolin.public-resources.qbit.rules[1].match: country
      pangolin.public-resources.qbit.rules[1].value: ALL
    ports:
      - '6888:6888/tcp'
      - '6888:6888/udp'
      - '8388:8388/tcp'
      - '8388:8388/udp'
      - '8888:8888/tcp'
      - '51413:51413/tcp'
      - '51413:51413/udp'

  qbit_novpn:
    profiles: [download]
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbit_novpn
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DATA/qbit_novpn/config:/config
      - $DATA/qbit_novpn/downloads:/qbit_novpn/downloads
    networks: [traefik, arr, newt]
    labels:
      homepage.group: Download
      homepage.name: QBittorrent (No VPN)
      homepage.icon: qbittorrent.png
      homepage.href: https://novpn.qbit.chenn.dev
      homepage.description: Torrent Client

      traefik.enable: true
      traefik.http.routers.qbit_novpn.rule: Host(`novpn.qbit.henn.dev`)
      traefik.http.routers.qbit_novpn.entrypoints: websecure
      traefik.http.routers.qbit_novpn.middlewares: hdrs@file
      traefik.http.routers.qbit_novpn.tls.certresolver: cf
      traefik.http.services.qbit_novpn.loadbalancer.server.port: 8080

      pangolin.public-resources.qbit_novpn.name: qbit_novpn
      pangolin.public-resources.qbit_novpn.full-domain: novpn.qbit.chenn.dev
      pangolin.public-resources.qbit_novpn.protocol: http
      pangolin.public-resources.qbit_novpn.ssl: true
      pangolin.public-resources.qbit_novpn.targets[0].method: http
      pangolin.public-resources.qbit_novpn.targets[0].port: 8080
      pangolin.public-resources.qbit_novpn.auth.sso-enabled: true
      pangolin.public-resources.qbit_novpn.auth.sso-roles[0]: Member
      pangolin.public-resources.qbit_novpn.rules[0].action: pass
      pangolin.public-resources.qbit_novpn.rules[0].match: country
      pangolin.public-resources.qbit_novpn.rules[0].value: US
      pangolin.public-resources.qbit_novpn.rules[1].action: deny
      pangolin.public-resources.qbit_novpn.rules[1].match: country
      pangolin.public-resources.qbit_novpn.rules[1].value: ALL

  qui:
    # crashes if oidc redirect not set. sadge
    profiles: [download]
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    restart: unless-stopped
    environment:
      QUI__OIDC_ISSUER: $OIDC
      QUI__OIDC_ENABLED: true
      QUI__OIDC_CLIENT_ID: $QUI_OIDC_CLIENT
      QUI__OIDC_CLIENT_SECRET: $QUI_OIDC_SECRET
      QUI__OIDC_REDIRECT_URL: https://qui.chenn.dev/api/auth/oidc/callback
      QUI__OIDC_DISABLE_BUILT_IN_LOGIN: true
    volumes:
      - $DATA/qui/config:/config
      - $DATA/qui/torrents:/data/torrents
      - $DATA/qbit/downloads:/qbit/downloads
      - $DATA/qbit_novpn:/qbit_novpn/downloads
    healthcheck:
      test: ['CMD', 'wget', '-qO', '--no-verbose', 'http://localhost:7476']
    networks: [arr, newt]
    labels:
      homepage.group: Download
      homepage.name: Qui
      homepage.icon: qui.png
      homepage.href: https://qui.chenn.dev
      homepage.description: Bittorrent GUI

      pangolin.public-resources.qui.name: qui
      pangolin.public-resources.qui.full-domain: qui.chenn.dev
      pangolin.public-resources.qui.protocol: http
      pangolin.public-resources.qui.ssl: true
      pangolin.public-resources.qui.targets[0].method: http
      pangolin.public-resources.qui.targets[0].port: 7476
      pangolin.public-resources.qui.auth.sso-enabled: true
      pangolin.public-resources.qui.auth.sso-roles[0]: Member
      pangolin.public-resources.qui.rules[0].action: pass
      pangolin.public-resources.qui.rules[0].match: country
      pangolin.public-resources.qui.rules[0].value: US
      pangolin.public-resources.qui.rules[1].action: deny
      pangolin.public-resources.qui.rules[1].match: country
      pangolin.public-resources.qui.rules[1].value: ALL
