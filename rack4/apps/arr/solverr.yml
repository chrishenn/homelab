---
services:
  solverr:
    profiles: [download]
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: solverr
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      LOG_LEVEL: info
      LOG_HTML: false
      CAPTCHA_SOLVER: none
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:8191/health | grep -q ''"status": "ok''']
    networks: [arr]

