---
services:
  radarr:
    profiles: [arr]
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      RADARR__AUTH__METHOD: External
    volumes:
      - $DATA/radarr:/config
      - $DATA/sab/downloads:/sab/downloads
      - $DATA/qbit/downloads:/qbit/downloads
      - $MEDIA:/media_library
    networks: [arr, newt]
    labels:
      homepage.group: Arr
      homepage.name: Radarr
      homepage.icon: radarr.png
      homepage.href: https://radarr.chenn.dev
      homepage.description: Movie Manager

      pangolin.public-resources.radarr.name: radarr
      pangolin.public-resources.radarr.full-domain: radarr.chenn.dev
      pangolin.public-resources.radarr.mode: http
      pangolin.public-resources.radarr.targets[0].method: http
      pangolin.public-resources.radarr.targets[0].port: 7878
      pangolin.public-resources.radarr.policy: arr

  sonarr:
    profiles: [arr]
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      SONARR__AUTH__METHOD: External
    volumes:
      - $DATA/sonarr:/config
      - $DATA/sab/downloads:/sab/downloads
      - $DATA/qbit/downloads:/qbit/downloads
      - $MEDIA:/media_library
    networks: [arr, newt]
    labels:
      homepage.group: Arr
      homepage.name: Sonarr
      homepage.icon: sonarr.png
      homepage.href: https://sonarr.chenn.dev
      homepage.description: TV Manager

      pangolin.public-resources.sonarr.name: sonarr
      pangolin.public-resources.sonarr.full-domain: sonarr.chenn.dev
      pangolin.public-resources.sonarr.mode: http
      pangolin.public-resources.sonarr.targets[0].method: http
      pangolin.public-resources.sonarr.targets[0].port: 8989
      pangolin.public-resources.sonarr.policy: arr

  prowlarr:
    profiles: [arr]
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - $DATA/prowlarr:/config
    networks: [arr, newt, traefik]
    labels:
      homepage.group: Arr
      homepage.name: Prowlarr
      homepage.icon: prowlarr.png
      homepage.href: https://prowlarr.chenn.dev
      homepage.description: Indexer Manager

      # NZB360 apparently can't handle basic auth headers, even though they're in the settings
      traefik.enable: true
      traefik.http.routers.prowlarr.rule: Host(`prowlarr.henn.dev`)
      traefik.http.routers.prowlarr.entrypoints: websecure
      traefik.http.routers.prowlarr.middlewares: hdrs@file
      traefik.http.routers.prowlarr.tls.certresolver: cf
      traefik.http.services.prowlarr.loadbalancer.server.port: 9696

      pangolin.public-resources.prowlarr.name: prowlarr
      pangolin.public-resources.prowlarr.full-domain: prowlarr.chenn.dev
      pangolin.public-resources.prowlarr.mode: http
      pangolin.public-resources.prowlarr.targets[0].method: http
      pangolin.public-resources.prowlarr.targets[0].port: 9696
      pangolin.public-resources.prowlarr.policy: arr

  bazarr:
    profiles: [arr]
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    volumes:
      - $DATA/bazarr:/config
      - $MEDIA:/media_library
    networks: [arr, newt]
    labels:
      homepage.group: Arr
      homepage.name: Bazarr
      homepage.icon: bazarr.png
      homepage.href: https://bazarr.chenn.dev
      homepage.description: Subtitle Manager

      pangolin.public-resources.bazarr.name: bazarr
      pangolin.public-resources.bazarr.full-domain: bazarr.chenn.dev
      pangolin.public-resources.bazarr.mode: http
      pangolin.public-resources.bazarr.targets[0].method: http
      pangolin.public-resources.bazarr.targets[0].port: 6767
      pangolin.public-resources.bazarr.policy: arr

  # sudo chown -R 1000:1000 $DATA/questarr
  questarr:
    profiles: [arr]
    image: ghcr.io/doezer/questarr:latest
    container_name: questarr
    restart: unless-stopped
    volumes:
      - $DATA/questarr:/app/data
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:5000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [arr, newt]
    labels:
      homepage.group: Arr
      homepage.name: questarr
      homepage.icon: questarr.png
      homepage.href: https://questarr.chenn.dev
      homepage.description: Games Manager

      pangolin.public-resources.questarr.name: questarr
      pangolin.public-resources.questarr.full-domain: questarr.chenn.dev
      pangolin.public-resources.questarr.mode: http
      pangolin.public-resources.questarr.targets[0].method: http
      pangolin.public-resources.questarr.targets[0].port: 5000
      pangolin.public-resources.questarr.policy: arr

networks:
  arr:
