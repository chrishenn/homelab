[tools]
just = "latest"
bun = "latest"
node = "latest"
pnpm = "latest"
fnox = "latest"
rclone = "latest"
mc = "latest"
glab = { version = "latest", exe = "glab" }
cargo-binstall = "latest"
"cargo:forgejo-cli" = "latest"
age = "latest"
regctl = "latest"
crane = "latest"
cue = "latest"

[env]
OP_RUN_NO_MASKING = true
COMPOSE_BAKE = true
SYNC_MODE = "cron"

TZ = "America/Chicago"
PUID = 1000
PGID = 1000

# compose host
DOCKER_HOST = "tcp://192.168.1.142:2375"

# paths to data
DATA = "/mnt/k/docker"
BACKUP = "/mnt/h/backup"
MEDIA = "/mnt/r/media_library"

# This is to ensure the auto-generated range does not conflict with any existing subnets
HOME_GATEWAY = "192.168.0.1"
HOME_SUBNET = "192.168.0.0/16"
TRAEFIK_GATEWAY = "192.170.0.1"
TRAEFIK_SUBNET = "192.170.0.0/16"
NEWT_GATEWAY = "192.169.0.1"
NEWT_SUBNET = "192.169.0.0/16"

# SVC_IP is the default bound IP for docker services, including blocky-dns on port 53
SVC_IP = "192.168.1.142"

# VPS0_USER
VPS0_USER = "chris"
VPS0_PORT = "2200"
VPS0_DATA = "/home/chris/data"

# gitlab runner
GITLAB_URL = "https://gitlab.henn.dev"

# public oidc provider
OIDC = "https://pocketid.chenn.dev"

STALWART_URL = "https://mail.chenn.dev"
