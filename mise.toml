[settings]
env_shell_expand = true

[tools]
gitleaks = "latest"
just = "latest"
pre-commit = "latest"
ruff = "latest"
bun = "latest"
node = "latest"
pnpm = "latest"
pkl = "latest"
shfmt = "latest"
shellcheck = "latest"
eza = "latest"
prettier = "latest"
ty = "latest"
hk = "latest"
trufflehog = "latest"

[hooks.enter]
shell = "bash"
script = "mise i -q"

[tasks.pre-commit]
alias = "pc"
run = "hk run pre-commit"

[env]
# note this is the local repo path; clones of repo may have diff locations on remotes
REPO = "{{ config_root | absolute }}"
REPO_NAME = "{{ config_root | basename }}"
FNOX_AGE_KEY_FILE = "~/.ssh/id_ed25519"
HK_MISE = 1
HK_LIBGIT2 = 0
MISE_NPM_BUN = 1

# remotes
