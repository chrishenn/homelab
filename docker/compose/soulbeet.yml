# soulseek is a semi-private semi-p2p network for music sharing - bit of a rabbithole
---
services:
  soulbeet:
    profiles: [soulbeet]
    image: docker.io/docccccc/soulbeet:latest
    container_name: soulbeet
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:/data/soulbeet.db
      DOWNLOAD_PATH: /downloads
      SECRET_KEY: secret_key
      NAVIDROME_URL: http://navidrome:4533
      BEETS_CONFIG: /config/config.yaml
    volumes:
      - $DATA/soulbeet/data:/data
      - $DATA/slskd/downloads:/downloads
      - $MEDIA/Music:/music
    networks: [newt]
    labels:
      homepage.group: Media
      homepage.name: Soulbeet
      homepage.icon: soulbeet.png
      homepage.href: https://soulbeet.chenn.dev
      homepage.description: Music Automation

      pangolin.public-resources.soulbeet.name: soulbeet
      pangolin.public-resources.soulbeet.full-domain: soulbeet.chenn.dev
      pangolin.public-resources.soulbeet.protocol: http
      pangolin.public-resources.soulbeet.ssl: true
      pangolin.public-resources.soulbeet.targets[0].method: http
      pangolin.public-resources.soulbeet.targets[0].port: 9765
      pangolin.public-resources.soulbeet.auth.sso-enabled: true
      pangolin.public-resources.soulbeet.rules[0].action: pass
      pangolin.public-resources.soulbeet.rules[0].match: country
      pangolin.public-resources.soulbeet.rules[0].value: US
      pangolin.public-resources.soulbeet.rules[0].priority: 0
      pangolin.public-resources.soulbeet.rules[1].action: deny
      pangolin.public-resources.soulbeet.rules[1].match: country
      pangolin.public-resources.soulbeet.rules[1].value: ALL
      pangolin.public-resources.soulbeet.rules[1].priority: 10
