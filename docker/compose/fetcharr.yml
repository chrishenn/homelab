# why does it try to fetch lower-quality releases than what I've already got?
---
services:
  fetcharr:
    profiles: [arr]
    image: egg82/fetcharr:latest
    container_name: fetcharr
    restart: unless-stopped
    environment:
      VERIFY_CERTS: true
      SSL_PATH: /etc/ssl/certs/ca-bundle.crt
      SEARCH_AMOUNT: 5
      SEARCH_INTERVAL: 1hour
      RADARR_0_URL: ${RADARR_URL}
      RADARR_0_API_KEY: ${RADARR_KEY}
    volumes:
      - $DATA/fetcharr/config:/app/config
      - $DATA/fetcharr/cache:/app/cache
      - $DATA/fetcharr/logs:/app/logs
      - $DATA/fetcharr/plugins:/app/plugins
    networks: [arr]
