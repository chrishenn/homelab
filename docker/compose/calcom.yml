# https://github.com/calcom/cal.com/pull/28756/changes
# https://calcom.chenn.dev/auth/setup
---
x-calcom_env: &calcom_env
  NEXT_PUBLIC_WEBAPP_URL: https://calcom.chenn.dev
  NEXT_PUBLIC_WEBSITE_URL: https://calcom.chenn.dev
  WEB_APP_URL: https://calcom.chenn.dev
  NEXTAUTH_URL: https://calcom.chenn.dev
  #  NEXT_PUBLIC_EMBED_LIB_URL: https://calcom.chenn.dev/embed/embed.js

  API_PORT: 80
  API_URL: http://calcom_api
  #  NEXT_PUBLIC_API_V2_URL: http://calcom_api:80/api/v2

  ALLOWED_HOSTNAMES: '"chenn.dev"'
  RESERVED_SUBDOMAINS: '"app","auth","docs","design","console","go","status","api","saml","www","matrix","developer","cal","my","team","support","security","blog","learn","admin"'

  NEXT_PUBLIC_APP_NAME: 'Chicken Cal'
  NEXT_PUBLIC_SUPPORT_MAIL_ADDRESS: 'chris@henn.dev'
  NEXT_PUBLIC_COMPANY_NAME: 'Dancing Chicken, Inc.'
  NEXT_PUBLIC_DISABLE_SIGNUP: false

  NEXTAUTH_SECRET: /Rs/zwfEZ+7qaffholMJ0PtPSZ4GTZ98Pi2YLppYF9M=
  JWT_SECRET: kn09SlXujfYMx2/B0DTHRG/B2OKmmdazkyTUdMOiwXo=
  CRON_API_KEY: 0cc0e6c35519bba620c9360cfe3e68d0
  CALENDSO_ENCRYPTION_KEY: uepFhLw90Tc+UUpbyCHFAFZUHxozLbPG
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: BDuhjfMvR82njzr7lYqvqYke-LEGFuxnYhKga28HGj8PWy_PYoAAnX-7jq3LLh3a-EhPaX8L5aJKvdUlsbDb4Zw
  VAPID_PRIVATE_KEY: XcYJjShFceEJVJ981WXLBdGTq8WsdYljJPRKA1CsLfk
  STRIPE_API_KEY: 1234
  STRIPE_WEBHOOK_SECRET: 1234
  CAL_SIGNATURE_TOKEN: 1234

  TZ: $TZ
  NODE_ENV: production
  LOG_LEVEL: DEBUG
  IS_E2E: false
  REWRITE_API_V2_PREFIX: true
  IS_TEAM_BILLING_ENABLED: false
  CRON_ENABLE_APP_SYNC: false
  CALCOM_PRIVATE_API_ROUTE:
  NODE_TLS_REJECT_UNAUTHORIZED: false
  ORGANIZATIONS_ENABLED: true
  CALCOM_TELEMETRY_DISABLED: true
  NEXT_PUBLIC_IS_PREMIUM_NEW_PLAN: false
  API_KEY_PREFIX: cal_
  NEXT_PUBLIC_TEAM_IMPERSONATION: false

  DATABASE_URL: postgresql://calcom:calcom@calcom_db/calcom
  DATABASE_DIRECT_URL: postgresql://calcom:calcom@calcom_db/calcom
  DATABASE_READ_URL: postgresql://calcom:calcom@calcom_db/calcom
  DATABASE_WRITE_URL: postgresql://calcom:calcom@calcom_db/calcom
  INSIGHTS_DATABASE_URL:

  POSTGRES_USER: calcom
  POSTGRES_PASSWORD: calcom
  POSTGRES_DB: calcom

  REDIS_URL: redis://calcom_redis:6379
  REDIS_PORT: 6379

  EMAIL_SERVER_HOST: ${SMTP_HOST}
  EMAIL_SERVER_PORT: 465
  EMAIL_SERVER_USER: ${SMTP_USER}
  EMAIL_FROM: ${SMTP_USER}
  EMAIL_SERVER_PASSWORD: ${SMTP_TOKEN}

services:
  calcom:
    profiles: [calcom]
    image: ${REGISTRY}/calcom:latest
    build:
      context: https://github.com/calcom/cal.com.git
      dockerfile: Dockerfile
      args:
        <<: *calcom_env
    container_name: calcom
    restart: unless-stopped
    environment:
      <<: *calcom_env
    depends_on:
      - calcom_db
    networks: [calcom, newt]
    labels:
      pangolin.public-resources.calcom.name: calcom
      pangolin.public-resources.calcom.full-domain: calcom.chenn.dev
      pangolin.public-resources.calcom.protocol: http
      pangolin.public-resources.calcom.ssl: true
      pangolin.public-resources.calcom.targets[0].method: http
      pangolin.public-resources.calcom.targets[0].port: 3000
  #      pangolin.public-resources.calcom.auth.sso-enabled: true
  #      pangolin.public-resources.calcom.auth.sso-roles[0]: Member
  #      pangolin.public-resources.calcom.rules[0].action: pass
  #      pangolin.public-resources.calcom.rules[0].match: country
  #      pangolin.public-resources.calcom.rules[0].value: US
  #      pangolin.public-resources.calcom.rules[0].priority: 0
  #      pangolin.public-resources.calcom.rules[1].action: deny
  #      pangolin.public-resources.calcom.rules[1].match: country
  #      pangolin.public-resources.calcom.rules[1].value: ALL
  #      pangolin.public-resources.calcom.rules[1].priority: 10

  calcom_api:
    profiles: [calcom]
    image: ${REGISTRY}/calcom_api:latest
    build:
      context: https://github.com/calcom/cal.com.git
      dockerfile: apps/api/v2/Dockerfile
      args:
        <<: *calcom_env
    container_name: calcom_api
    restart: unless-stopped
    environment:
      <<: *calcom_env
    depends_on:
      - calcom_db
      - calcom_redis
    networks: [calcom]

  calcom_db:
    profiles: [calcom]
    image: postgres:18-alpine
    container_name: calcom_db
    restart: unless-stopped
    environment:
      <<: *calcom_env
    volumes:
      - $DATA/calcom/db:/var/lib/postgresql
    networks: [calcom]

  calcom_redis:
    profiles: [calcom]
    image: redis:latest
    container_name: calcom_redis
    restart: unless-stopped
    volumes:
      - $DATA/calcom/redis:/data
    networks: [calcom]

networks:
  calcom:
