services:
  # https://bonfire.chenn.dev/signup
  bonfire:
    profiles: [bonfire]
    image: bonfirenetworks/bonfire:latest-social-amd64
    container_name: bonfire
    restart: unless-stopped
    environment:
      <<: *bonfire_env
    volumes:
      - $DATA/bonfire/uploads:/opt/app/data/uploads
    networks: [bonfire, newt]
    labels:
      pangolin.public-resources.bonfire.name: bonfire
      pangolin.public-resources.bonfire.full-domain: bonfire.chenn.dev
      pangolin.public-resources.bonfire.protocol: http
      pangolin.public-resources.bonfire.ssl: true

      pangolin.public-resources.bonfire.targets[0].method: http
      pangolin.public-resources.bonfire.targets[0].path-match: prefix
      pangolin.public-resources.bonfire.targets[0].path: /
      pangolin.public-resources.bonfire.targets[0].port: 4000
      pangolin.public-resources.bonfire.targets[0].priority: 2

      pangolin.public-resources.bonfire.auth.sso-enabled: true
      pangolin.public-resources.bonfire.auth.sso-roles[0]: Member

      pangolin.public-resources.bonfire.rules[0].action: allow
      pangolin.public-resources.bonfire.rules[0].match: path
      pangolin.public-resources.bonfire.rules[0].value: /data/uploads/*

      pangolin.public-resources.bonfire.rules[1].action: pass
      pangolin.public-resources.bonfire.rules[1].match: country
      pangolin.public-resources.bonfire.rules[1].value: US
      pangolin.public-resources.bonfire.rules[2].action: deny
      pangolin.public-resources.bonfire.rules[2].match: country
      pangolin.public-resources.bonfire.rules[2].value: ALL

  bonfire_caddy:
    profiles: [bonfire]
    image: caddy:alpine
    container_name: bonfire_caddy
    restart: unless-stopped
    environment:
      <<: *bonfire_env
    configs:
      - source: bonfire_caddy
        target: /etc/caddy/Caddyfile
    volumes:
      - $DATA/bonfire/caddy_data:/data
      - $DATA/bonfire/caddy_config:/config
      - $DATA/bonfire/uploads:/frontend/uploads
    networks: [bonfire, newt]
    labels:
      pangolin.public-resources.bonfire.targets[1].method: http
      pangolin.public-resources.bonfire.targets[1].path-match: prefix
      pangolin.public-resources.bonfire.targets[1].path: /data/uploads
      pangolin.public-resources.bonfire.targets[1].port: 80
      pangolin.public-resources.bonfire.targets[1].priority: 1

  bonfire_db:
    profiles: [bonfire]
    image: postgis/postgis:18-3.6-alpine
    container_name: bonfire_db
    restart: unless-stopped
    entrypoint: ['/bin/bash', '/opt/bonfire/deploy/postgres-entrypoint.sh']
    environment:
      <<: *bonfire_env
    volumes:
      - $DATA/bonfire/db:/var/lib/postgresql
      - ./bonfire:/opt/bonfire/deploy:ro
    networks: [bonfire]

  bonfire_search:
    profiles: [bonfire]
    image: getmeili/meilisearch:v1.11
    container_name: bonfire_search
    restart: unless-stopped
    environment:
      <<: *bonfire_env
    volumes:
      - $DATA/bonfire/meili:/meili_data
    networks: [bonfire]

networks:
  bonfire:
