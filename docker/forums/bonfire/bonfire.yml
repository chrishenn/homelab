---
configs:
  bonfire_caddy:
    content: |
      :80
      route /data/uploads/* {
        root * /frontend/
        try_files {path}
        file_server
      }

      encode gzip
      log
      handle_errors {
      	@502 expression `{http.error.status_code} == 502`
      	handle @502 {
          respond 503 {
            body "Hello, unfortunately this instance seems to be down. Please try again in a few minutes!"
            close
          }
      	}
      }

