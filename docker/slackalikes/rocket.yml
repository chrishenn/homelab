# these are truly some of the most baffling decisions I've ever seen in a compose file. wow
# missing config key causes the whole app to crash with no logs - amateurish, embarassing
# doesn't support OIDC discovery, and I can't get the OAUTH config to work
# basic stuff like smtp, oauth must be configured in the UI. terrible

# I would generally say that this application is not well-written
# fairly janky and prone to dumping itself back to the configuration wizard

# TO THAT NOTE: IF YOU TRY TO LOG IN THE ADMIN USER WITH OIDC THE WHOLE THING ABSOLUTELY FALLS OVER.
# OH MY GOD IT CORRUPTED THE DATABASE. ARE YOU KIDING ME!!?!?!?
# WHAT A PILE OF JUNK !!!!!!!!!!!!!!! IMAGINE CHARGING MONEY FOR THIS LMAO

---
x-rocket_env: &rocket_env
  ROOT_URL: https://rocket.chenn.dev
  DOMAIN: rocket.chenn.dev
  PORT: 3000
  DEPLOY_METHOD: docker
  DEPLOY_PLATFORM: compose
  LICENSE_DEBUG: true
  REG_TOKEN:
  INSTANCE_IP:
  RELEASE: 8.3.2

  ADMIN_USERNAME: ${USER}
  ADMIN_NAME: ${USER}
  ADMIN_EMAIL: ${EMAIL}
  ADMIN_PASS: ${ROCKET_PASS}

  TRANSPORTER: monolith+nats://rocket_nats:4222

  MONGODB_ADVERTISED_HOSTNAME: rocket_db
  MONGO_URL: mongodb://rocket_db:27017/rocketchat?replicaSet=rs0
  MONGODB_USER_ID: 1001
  MONGODB_PORT_NUMBER: 27017
  ALLOW_EMPTY_PASSWORD: yes
  MONGODB_REPLICA_SET_NAME: rs0
  MONGODB_REPLICA_SET_MODE: primary
  MONGODB_INITIAL_PRIMARY_HOST: rocket_db
  MONGODB_INITIAL_PRIMARY_PORT_NUMBER: 27017
  MONGODB_ENABLE_JOURNAL: true

  OVERWRITE_SETTING_Prometheus_Enabled: false
  OVERWRITE_SETTING_Prometheus_Port: 9458
  PROMETHEUS_RETENTION_SIZE: 15GB
  PROMETHEUS_RETENTION_TIME: 15d
  PROMETHEUS_PORT: 9000

  GRAFANA_DOMAIN:
  GRAFANA_PATH: /grafana
  GRAFANA_ADMIN_PASSWORD: rc-admin
  GRAFANA_HOST_PORT: 5050
  GRAFANA_BIND_IP: 127.0.0.1

services:
  rocket:
    profiles: [rocket]
    image: rocket.chat:latest
    container_name: rocket
    restart: unless-stopped
    environment:
      <<: *rocket_env
    networks: [rocket, newt]
    labels:
      pangolin.public-resources.rocket.name: rocket
      pangolin.public-resources.rocket.full-domain: rocket.chenn.dev
      pangolin.public-resources.rocket.protocol: http
      pangolin.public-resources.rocket.ssl: true
      pangolin.public-resources.rocket.targets[0].method: http
      pangolin.public-resources.rocket.targets[0].port: 3000
      pangolin.public-resources.rocket.auth.sso-enabled: true
      pangolin.public-resources.rocket.auth.sso-roles[0]: Member
      pangolin.public-resources.rocket.rules[0].action: pass
      pangolin.public-resources.rocket.rules[0].match: country
      pangolin.public-resources.rocket.rules[0].value: US
      pangolin.public-resources.rocket.rules[0].priority: 0
      pangolin.public-resources.rocket.rules[1].action: deny
      pangolin.public-resources.rocket.rules[1].match: country
      pangolin.public-resources.rocket.rules[1].value: ALL
      pangolin.public-resources.rocket.rules[1].priority: 10

  rocket_nats:
    profiles: [rocket]
    image: nats:2.11-alpine
    container_name: rocket_nats
    restart: unless-stopped
    command: --http_port 8222
    networks: [rocket]

  rocket_db:
    profiles: [rocket]
    image: bitnamilegacy/mongodb:8.0
    container_name: rocket_db
    restart: unless-stopped
    environment:
      <<: *rocket_env
    volumes:
      - $DATA/rocket/mongo:/data/db
    networks: [rocket]

networks:
  rocket:
