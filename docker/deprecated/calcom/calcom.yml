# https://calcom.chenn.dev/auth/setup
---
x-calcom_env: &calcom_env
  DATABASE_URL: postgresql://calcom:calcom@calcom_db/calcom
  DATABASE_DIRECT_URL: postgresql://calcom:calcom@calcom_db/calcom
  DATABASE_READ_URL: postgresql://calcom:calcom@calcom_db/calcom
  DATABASE_WRITE_URL: postgresql://calcom:calcom@calcom_db/calcom
  REDIS_URL: redis://calcom_redis:6379

  EMAIL_SERVER_HOST: ${SMTP_HOST}
  EMAIL_SERVER_PORT: 465
  EMAIL_SERVER_USER: ${SMTP_USER}
  EMAIL_FROM: ${SMTP_USER}
  EMAIL_FROM_NAME: ${SMTP_USER}
  EMAIL_SERVER_PASSWORD: ${SMTP_TOKEN}

  NEXTAUTH_SECRET: ${CALCOM_NEXTAUTH_SECRET}
  CALENDSO_ENCRYPTION_KEY: ${CALCOM_CALENDSO_ENCRYPTION_KEY}
  JWT_SECRET: ${CALCOM_JWT_SECRET}
  CRON_API_KEY: ${CALCOM_CRON_API_KEY}
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${CALCOM_VAPID_PUBLIC_KEY}
  VAPID_PRIVATE_KEY: ${CALCOM_VAPID_PRIVATE_KEY}
  CRON_ENABLE_APP_SYNC: false
  NEXTAUTH_COOKIE_DOMAIN:

  NEXT_PUBLIC_WEBAPP_URL: https://calcom.chenn.dev
  NEXT_PUBLIC_WEBSITE_URL: https://calcom.chenn.dev
  NEXT_PUBLIC_EMBED_LIB_URL: https://calcom.chenn.dev/embed/embed.js
  NEXT_PUBLIC_API_V2_URL: https://calcom.chenn.dev/api/v2
  WEB_APP_URL: https://calcom.chenn.dev
  API_URL: https://calcom.chenn.dev/api/v2
  API_PORT: 80
  # comma-delim list. Yes, this is the correct format for calcom.chenn.dev. Yes, it is that stupid. No, it is not documented.
  ALLOWED_HOSTNAMES: '"chenn.dev"'
  RESERVED_SUBDOMAINS: '"app","auth","docs","design","console","go","status","api","saml","www","matrix","developer","cal","my","team","support","security","blog","learn","admin"'

  NEXT_PUBLIC_APP_NAME: Chicken Calcom
  NEXT_PUBLIC_COMPANY_NAME: 'Chicken Inc'
  NEXT_PUBLIC_SUPPORT_MAIL_ADDRESS: ${SMTP_USER}
  NEXT_PUBLIC_DISABLE_SIGNUP: 0
  CALCOM_TELEMETRY_DISABLED: 1
  API_KEY_PREFIX: cal_
  TZ: $TZ
  LINKEDIN_ADS_ENABLED: 0
  # this is some sort of fucking vercel shit - impossible to tell wtf it does from the name
  ORGANIZATIONS_ENABLED: 0
  # the default value of 4096 will cause OOM when building the calcom image
  MAX_OLD_SPACE_SIZE: 16384

  NODE_ENV: production
  LOG_LEVEL: info
  IS_E2E: false
  CALCOM_LICENSE_KEY:
  REWRITE_API_V2_PREFIX: true
  CAL_SIGNATURE_TOKEN: 1234
  STRIPE_API_KEY: 1234
  STRIPE_WEBHOOK_SECRET: 1234

services:
  calcom:
    profiles: [calcom]
    image: ${REGISTRY}/calcom:latest
    container_name: calcom
    build:
      context: https://github.com/calcom/cal.diy.git#v6.2.0
      args:
        <<: *calcom_env
    restart: unless-stopped
    environment:
      <<: *calcom_env
    networks: [calcom, newt]
    labels:
      pangolin.public-resources.calcom.name: calcom
      pangolin.public-resources.calcom.full-domain: calcom.chenn.dev
      pangolin.public-resources.calcom.protocol: http
      pangolin.public-resources.calcom.ssl: true

      pangolin.public-resources.calcom.targets[0].method: http
      pangolin.public-resources.calcom.targets[0].path-match: prefix
      pangolin.public-resources.calcom.targets[0].path: /
      pangolin.public-resources.calcom.targets[0].port: 3000
      pangolin.public-resources.calcom.targets[0].priority: 2

      pangolin.public-resources.calcom.auth.sso-enabled: true
      pangolin.public-resources.calcom.auth.sso-roles[0]: Member
      pangolin.public-resources.calcom.rules[0].action: allow
      pangolin.public-resources.calcom.rules[0].match: path
      pangolin.public-resources.calcom.rules[0].value: /api/*
      pangolin.public-resources.calcom.rules[1].action: pass
      pangolin.public-resources.calcom.rules[1].match: country
      pangolin.public-resources.calcom.rules[1].value: US
      pangolin.public-resources.calcom.rules[2].action: deny
      pangolin.public-resources.calcom.rules[2].match: country
      pangolin.public-resources.calcom.rules[2].value: ALL

  calcom_api:
    profiles: [calcom]
    image: ${REGISTRY}/calcom_api:latest
    container_name: calcom_api
    build:
      context: https://github.com/calcom/cal.diy.git#v6.2.0
      dockerfile: apps/api/v2/Dockerfile
      args:
        <<: *calcom_env
    restart: unless-stopped
    environment:
      <<: *calcom_env
    networks: [calcom, newt]
    labels:
      pangolin.public-resources.calcom.targets[1].method: http
      pangolin.public-resources.calcom.targets[1].path-match: prefix
      pangolin.public-resources.calcom.targets[1].path: /api
      pangolin.public-resources.calcom.targets[1].port: 80
      pangolin.public-resources.calcom.targets[1].priority: 1

  calcom_db:
    profiles: [calcom]
    image: postgres:18-alpine
    container_name: calcom_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: calcom
      POSTGRES_PASSWORD: calcom
      POSTGRES_DB: calcom
    volumes:
      - $DATA/calcom/db:/var/lib/postgresql
    networks: [calcom]

  calcom_redis:
    profiles: [calcom]
    image: valkey/valkey:alpine
    container_name: calcom_redis
    restart: unless-stopped
    volumes:
      - $DATA/calcom/redis:/data
    networks: [calcom]

networks:
  calcom:
